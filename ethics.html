<p class="lead">Half terminology + half method. Memorise the role names, the two numeric standards, and the FMEA/HAZOP/FTA distinctions. Ordinal ranks are a recurring trap.</p>

<h3>M1 ¬∑ Terminology</h3>
<table class="zebra"><thead><tr><th>Role</th><th>Meaning</th></tr></thead><tbody>
<tr><td><b>Risk source</b></td><td>The feature that can cause harm</td></tr>
<tr><td><b>Risk type</b></td><td>The form of harm (health, environmental, financial‚Ä¶)</td></tr>
<tr><td><b>Risk bearer</b> / exposed</td><td>Who runs the risk</td></tr>
<tr><td><b>Risk owner</b> / decision-maker</td><td>Who can control/manage it</td></tr>
<tr><td><b>Risk beneficiary</b></td><td>Who <b>profits</b> from the risk being taken</td></tr>
<tr><td><b>Risk analyst</b></td><td>Who identifies/calculates/assesses</td></tr>
</tbody></table>
<p>One actor can hold several roles. Five steps: <b>Identification ‚Üí Quantification ‚Üí Assessment ‚Üí Recommendations ‚Üí Communication.</b></p>
<div class="trapbox"><div class="th">Case traps (verified)</div><p><b>Enschede:</b> there were multiple risk beneficiaries; storage did <b>not</b> meet basic safety regulations (heavier fireworks stored illegally, fire doors open).<br><b>Barendrecht:</b> there were multiple risk types; <b>some risk bearers did not accept</b> being exposed. Government (VROM) left Shell in the lead.</p></div>

<h3>M2 ¬∑ Definition of risk</h3>
<div class="formula"><span class="hl">Risk = probability of occurrence √ó magnitude/severity of harm</span></div>
<p><b>Risk vs uncertainty:</b> a <b>risk</b> has quantifiable probability and/or harm (repeats, reliable frequency data, expert agreement). An <b>uncertainty</b> has none ‚Äî unique/novel events (pandemic, Gulfstream shift, meteor strike, alien contact). List uncertainties in the Discussion; don't ignore them.</p>

<h3>M2 ¬∑ Probability</h3>
<ul>
<li><b>Frequentism</b> (objectivist): probability = limiting relative frequency. Default in risk analysis. <b>NOT person-relative.</b></li>
<li><b>Bayesianism</b> (subjectivist): degree of belief, updated with evidence.</li>
<li><b>Poisson</b> P(k)=Œª<sup>k</sup>e<sup>‚àíŒª</sup>/k! ‚Äî number of failures in an interval. <b>Exponential</b> ‚Äî distance/time between failures. Both assume constant rate & independence.</li>
</ul>
<div class="keybox"><div class="th">Computation you must do</div><p>Rate Œª = 1/yr, "fails only after 2 years" = zero failures in 2 yr ‚Üí Poisson with Œª¬∑t = 2, k = 0: P = e<sup>‚àí2</sup> ‚âà <b>0.1353</b>.</p></div>
<div class="trapbox"><div class="th">Trap</div><p><b>Failure-rate data represent frequencies.</b> Reference classes are not necessarily small. Reducing a system to components is a workaround for the <b>uniqueness</b> problem (not the reference-class problem).</p></div>

<h3>M2 ¬∑ Standards</h3>
<div class="formula">Individual risk: <span class="hl">IR<sub>x</sub> ‚â§ 10<sup>‚àí6</sup>/yr</span> (ordinary public, involuntary) ¬∑ <span class="hl">10<sup>‚àí4</sup></span> (voluntary, e.g. plant personnel)</div>
<ul>
<li>Individual risk applies to a <b>location</b>, not a person (prob. of death of an average unprotected person constantly there). Risk <b>contours</b> connect equal-IR points.</li>
<li><b>Group/societal risk</b> ‚Üí <b>FN curve</b>: F = <b>cumulative</b> frequency of events with <b>at least</b> N casualties ‚Üí monotonically decreasing, plotted log-log. a = risk-aversion factor (higher a = stricter). The same plant can pass in the UK and fail in NL.</li>
<li>Always report results <b>with error margins</b>; if the upper bound exceeds the standard you cannot call it tolerable.</li>
</ul>

<h3>M2 ¬∑ ALARP &amp; risk matrices</h3>
<p><b>ALARP</b> = As Low As Reasonably Practicable: a risk is <b>tolerable</b> (not merely acceptable) if further reduction would cost more than the benefit. Three bands: unacceptable / tolerable(ALARP) / broadly acceptable.</p>
<div class="trapbox"><div class="th">Risk-matrix traps</div><p>Ranks are <b>ordinal labels</b> ‚Äî never multiply them (a "12" is not worse than a "10"; RPN is nonsensical). <b>Upsides</b> of a matrix: <b>less time-consuming</b> and <b>usable with little reliable information.</b> Downsides: depends on rank definitions; struggles with very small risks.</p></div>

<h3>M3 ¬∑ Identification ‚Äî FMEA &amp; HAZOP</h3>
<p>A <b>full sweep</b> avoids <b>normalcy</b> and <b>availability</b> bias (many small-harm/high-frequency sources add up). Requires robust <b>system description</b>: components, organisation, interaction, purpose, boundary, granularity.</p>
<table class="zebra"><thead><tr><th>FMEA</th><th>HAZOP</th></tr></thead><tbody>
<tr><td>Reviews each <b>component</b></td><td>Reviews each <b>node</b> (chunk/process step)</td></tr>
<tr><td>Generic <b>failure modes</b></td><td><b>Guidewords √ó parameters</b></td></tr>
<tr><td>Ranks SEV/OCC/DET</td><td>May add qualitative occurrence/severity</td></tr>
</tbody></table>
<div class="trapbox"><div class="th">FMEA traps</div><p><b>Effects need not be unique</b> to a failure mode. <b>Installation/assembly flaws are a valid cause.</b> A single failure mode can have multiple causes. RPN = OCC√óSEV√óDET is <b>nonsensical</b> (ordinal). Both FMEA & HAZOP tables include causes <b>and</b> effects, and existing controls.</p></div>

<h3>M4 ¬∑ Fault Tree Analysis (FTA)</h3>
<ul>
<li>Top-down from a well-defined <b>top-level event</b> to <b>basic events</b>, via <b>AND</b> (beehive) / <b>OR</b> (arrow) gates. The result is a probability, not the gate diagram.</li>
<li><b>All events are binary</b> ‚Äî FTA cannot model partial failure. It oversimplifies causation and needs basic-event data.</li>
<li><b>Minimal cut set (MCS):</b> a set of basic events that, if all occur, cause the top event ‚Äî and is minimal (remove any member and it's no longer a cut set). P(T) ‚âà Œ£ P(MCS).</li>
<li><b>Singleton MCSs</b> dominate P(T) ‚Üí prioritise them. A <b>common-cause</b> failure appears in <b>multiple</b> branches.</li>
</ul>

<h3>M4 ¬∑ Failure data &amp; errors</h3>
<ul>
<li>Failure rate Œª is the <b>rate parameter of an exponential distribution</b>, not a probability; usually in failures/10<sup>6</sup> h. For small Œªt, P ‚âà Œªt. Use the <b>upper bound</b> for a conservative estimate.</li>
<li><b>Sensitivity analysis</b>: which inputs most affect the output (events nearer the top via fewer AND gates matter more). Always <b>state assumptions</b> and report ALARP-zone results with <b>error margins</b>.</li>
</ul>

<h3>M5 ¬∑ Recommendations &amp; communication</h3>
<ul>
<li>Reduce risk by lowering <b>probability</b> or <b>harm</b>. Three measures: extra <b>layers of protection</b> (LOPA ‚Äî independent layers via AND gates; <b>emergency response is the final layer</b>), <b>redundancies</b> (parallel sufficient components), <b>replace the weakest link</b> (least effective ‚Äî except removing unreliable <b>humans</b>).</li>
<li><b>Human error rates are poorly documented</b> and orders of magnitude larger than hardware; worse under stress/boredom.</li>
<li>An FMEA's action columns can <b>assign responsibility</b> for follow-up. Decision-makers need <b>cost estimates</b>. Communicate: concise, jargon-free, visual, fair comparisons (don't compare voluntary vs involuntary risk); <b>trust is key.</b></li>
</ul>
`;

BIBLE.lca = `
<p class="lead">Four modules: sustainability framing ‚Üí Material Flow Analysis (the mass-balance engine) ‚Üí Life Cycle Assessment (impact on top of MFA) ‚Üí the research agenda. It is mostly definitions and distinctions, with a few mass-balance and CO2-equivalent calculations. The exam loves "which is NOT true" ‚Äî learn the lists.</p>

<h3>M1 ¬∑ Sustainability</h3>
<p><b>Brundtland (1987):</b> development that meets present needs without compromising future generations' ability to meet theirs. Criticised for being <b>too vague</b> ‚Äî it never pins down: what the "needs" are, whether there are limits to them, how to assess future generations' needs, or how justice & quality of life (esp. for developing countries) fit in.</p>
<div class="trapbox"><div class="th">Trap</div><p>"Reductionist / should be more holistic" is <b>NOT</b> a Brundtland critique ‚Äî the critiques are all about <b>vagueness</b>. And Elkington (who invented PPP) would not say sustainability "can't be drawn as three circles".</p></div>
<p><b>People‚ÄìPlanet‚ÄìProfit (triple bottom line, Elkington):</b></p>
<table class="zebra"><thead><tr><th>P</th><th>Domain ¬∑ example themes</th></tr></thead><tbody>
<tr><td><b>People</b></td><td>Social/ethical: wages & education, human rights, anti-bribery, child labour, diversity</td></tr>
<tr><td><b>Planet</b></td><td>Environmental: eco-design, environmental care, cleaner production, chain management</td></tr>
<tr><td><b>Profit</b></td><td>Economic: turnover/profit, employment, infrastructure investment, outsourcing</td></tr>
</tbody></table>
<p>Three-circle metaphor raises real questions: equal size or one dominant? the overlap "sweet spot" or the total area? can circles grow or are there limits? Carson/Daly prefer <b>nested</b> circles ‚Äî economy inside society inside nature.</p>
<p><b>17 SDGs (UN, 2015):</b> a shared blueprint mixing <b>ultimate goals</b> (no poverty, health), <b>hotspots</b> (cities), and <b>means</b> (partnerships, innovation), each with targets & indicators.</p>
<div class="trapbox"><div class="th">Trap</div><p>SDGs do <b>NOT</b> assign specific countries to "own" each goal. And material flows touch <b>almost all</b> SDGs (especially SDG 12), not just four.</p></div>
<h4>Assessment as empowerment</h4>
<p>Assessment = judging amount/value/quality/importance. Three acts: <b>goal-setting</b> (define problem & goal ‚Äî not measuring), <b>sensing</b> (status, what/how to measure), <b>acting</b> (explore solution space, empower action). Tools give <b>practical</b> value (pre-structured models/data ‚Üí easier), <b>methodological</b> value (consistent, comparable), and <b>social</b> value (makes problems understandable ‚Üí change).</p>
<p>Pick the tool for the job: tracing a substance's source ‚Üí <b>MFA</b>; weighing environment + social + financial ‚Üí <b>multi-criteria analysis</b>; product environmental impact ‚Üí <b>LCA</b>.</p>

<h3>M2 ¬∑ Material Flow Analysis (MFA)</h3>
<p><b>MFA</b> = the systematic assessment of <b>flows and stocks</b> of a material/substance within a system defined in space and time. It can be applied from products to whole economies.</p>
<div class="trapbox"><div class="th">Trap</div><p>MFA tracks <b>physical mass</b> (mass balance) ‚Äî it does <b>not</b> by itself value economic worth or compute environmental impact. That is LCA's job.</p></div>
<h4>Flow types to recognise</h4>
<table class="zebra"><thead><tr><th>Distinction</th><th>Meaning</th></tr></thead><tbody>
<tr><td><b>Used / unused</b></td><td>Used = enters the economy; unused ("hidden flows") = overburden, by-catch, harvesting losses</td></tr>
<tr><td><b>Direct / indirect</b></td><td>Direct = the product's own mass; indirect = materials needed to make it but not embedded</td></tr>
<tr><td><b>Concentrated / dissipative</b></td><td>Dissipative = dispersed by use (tyre wear, fertiliser, de-icing salt) ‚Äî hard to recover</td></tr>
<tr><td><b>Elephants / scorpions</b></td><td><b>Elephants</b> = bulk-volume problems (sand, building materials); <b>scorpions</b> = high impact at low volume (toxics, heavy metals, PFAS)</td></tr>
</tbody></table>
<div class="formula">Mass balance: <span class="hl">Œ£ inputs = Œ£ accumulation + Œ£ products + Œ£ emissions & waste</span> (holds for the whole system and every sub-process)</div>
<h4>The four MFA steps (in order)</h4>
<div class="keybox"><div class="th">Order matters</div><p><b>1 System definition</b> (goal, scope, boundaries) ‚Üí <b>2 Identify process steps</b> (draw the flow chart) ‚Üí <b>3 Draw up balances</b> (gather data, SI units, calculate) ‚Üí <b>4 Interpret</b> (conclusions).</p></div>
<h4>System boundaries</h4>
<table class="zebra"><thead><tr><th>Boundary</th><th>Covers</th></tr></thead><tbody>
<tr><td><b>Cradle-to-grave</b></td><td>Full life cycle: extraction ‚Üí production ‚Üí use ‚Üí end-of-life</td></tr>
<tr><td><b>Cradle-to-gate</b></td><td>From mining up to the factory exit (partial)</td></tr>
<tr><td><b>Gate-to-gate</b></td><td>Within the factory only</td></tr>
<tr><td><b>Cradle-to-cradle</b></td><td>Cradle-to-grave but disposal replaced by upgrade/reuse/recycling</td></tr>
</tbody></table>
<p>Also set <b>geographical</b>, <b>temporal</b>, <b>cut-off</b> (drop <2% etc.) and <b>allocation</b> boundaries. Boundaries follow the system and goal ‚Äî not national borders.</p>
<h4>Data quality</h4>
<p>Two myths: that <b>completeness can be achieved</b>, and that you need <b>all data before concluding</b>. Both false ‚Äî use the <b>20-80 rule</b>: ~20% of the effort gets ~80% of the result.</p>
<div class="trapbox"><div class="th">Trap</div><p>The <b>Pedigree matrix</b> scores <b>data quality</b> across reliability/precision, completeness, and temporal/geographical/technological correlation. "Sensitivity of the outcome" is <b>NOT</b> a pedigree indicator.</p></div>
<h4>Diagrams</h4>
<p><b>Flow chart</b> = boxes (processes) + arrows (flows) + stocks + boundary ‚Üí emphasises <b>processes</b>. <b>Sankey</b> ‚Üí arrow width ‚àù flow size, emphasises <b>magnitude</b>; in = out, colours separate materials. "Functional outpost" is not a building block (the real one is the <b>functional unit</b>).</p>

<h3>M3 ¬∑ Life Cycle Assessment (LCA)</h3>
<p><b>Life Cycle Thinking (LCT)</b> = the holistic cradle-to-grave mindset (avoid shifting burdens between stages, countries or impact categories). It is made operational by <b>LCA</b> ‚Äî "the compilation and evaluation of the inputs, outputs and potential environmental impacts of a product system throughout its life cycle" (ISO 14040). Standards: <b>ISO 14040‚Äì14044</b>.</p>
<p><b>Three study types:</b> <b>screening</b> (quick hotspot scan, average data) ¬∑ <b>full</b> (detailed, software, uncertainty reflection) ¬∑ <b>broadening/deepening</b> (combine with LCC, social LCA, dynamic/prospective). Aside: <b>attributional</b> = a product's share of existing impact; <b>consequential</b> = how impact changes from a decision.</p>
<h4>Functional unit</h4>
<p>The quantified <b>service</b> the product delivers (e.g. "1000 h of 800-lumen light"), the basis for fair comparison ‚Äî made operational by a <b>reference flow</b>.</p>
<div class="trapbox"><div class="th">Trap</div><p>The functional unit is the <b>product's function</b>, never "nature's function". Diaper case: the best functional unit is <b>"one baby"</b> ‚Äî it absorbs the different reuse counts, pack sizes and even the earlier toilet-training.</p></div>
<h4>Inventory (LCI)</h4>
<p><b>Foreground</b> = product-specific processes ‚Üí use <b>primary data</b> (developer + tier-one suppliers). <b>Background</b> = the wider economy ‚Üí <b>secondary data</b> (averages, EcoInvent). Data-quality dimensions: technological / temporal / geographical representativeness, precision, completeness, consistency, reproducibility. Use <b>cut-off</b> and an <b>iterative screening</b> approach to avoid drowning in data.</p>
<h4>Impact assessment ‚Äî four steps</h4>
<div class="keybox"><div class="th">Memorise the sequence</div><p><b>1 Classification</b> ‚Üí sort inventory flows into impact categories (CO2, CH4 ‚Üí climate change).<br><b>2 Characterisation</b> ‚Üí convert to a common unit per category via characterisation factors (CO2-equivalents). Midpoint = per category; endpoint = damage to human health / ecosystems / resources.<br><b>3 Normalisation</b> (optional) ‚Üí scale against a reference (per-person/-country annual impact).<br><b>4 Weighting</b> (optional) ‚Üí value-based importance across categories ‚Üí single score.</p></div>
<div class="formula">Impact = <span class="hl">Œ£ (mass·µ¢ √ó characterisation factor·µ¢)</span> &nbsp;¬∑ e.g. GWP factors CO2=1, CH4=34, N2O=298, CFC-13=15451</div>
<p>So 32 kg CO2 + 5 kg CH4 + 0.02 kg N2O = 32 + 170 + 5.96 ‚âà <b>208 kg CO2-eq</b> (SO2 is acidification, not GWP). A <b>tiny</b> mass of a potent gas (CFC-13) can dominate the total.</p>
<div class="trapbox"><div class="th">Trap</div><p>Characterised scores <b>ARE</b> summed within a theme (total CO2-eq). On a characterised bar chart the worst option = <b>100%</b> per category, so you may compare products <b>within</b> a category but <b>never across</b> categories. The <b>4 weighting methods</b> = distance-to-policy-target, distance-to-scientific-target, monetisation, <b>panel</b> (a large group ‚Äî not "a single expert").</p></div>
<h4>Interpretation ‚Äî five steps</h4>
<p><b>1 Completeness check ‚Üí 2 Consistency check ‚Üí 3 Reliability & sensitivity ‚Üí 4 Interpretation ‚Üí 5 Conclusion & reporting.</b> A <b>contribution / hotspot analysis</b> finds the biggest-impact stages, processes and categories. <b>Reliability</b> analysis = trustworthiness of uncertain data; <b>sensitivity</b> analysis = how uncertain data/assumptions move the result (perturbation or scenarios). Meta-reviews compare many studies to challenge assumptions.</p>

<h3>M4 ¬∑ The LCA research agenda</h3>
<p>Each topic starts as a critique of plain LCA:</p>
<table class="zebra"><thead><tr><th>Critique</th><th>Answer</th></tr></thead><tbody>
<tr><td>Depletion is not really what we care about</td><td><b>Criticality</b> (supply risk √ó importance) and <b>circularity</b> (keep materials in the loop) ‚Äî build on the LCA inventory, add indicators & re-do allocation for second life</td></tr>
<tr><td>LCA is backward-looking, needs existing-product data</td><td><b>Prospective LCA</b> ‚Äî model the emerging tech in a <b>future</b> state (scaling, learning, integration); scenarios for the background</td></tr>
<tr><td>Where do societal stakeholders fit?</td><td><b>RRI</b> ‚Äî engage actors early, value-driven</td></tr>
<tr><td>Society needs action, not just assessment</td><td>Integrate LCA into <b>sustainable business-model</b> innovation</td></tr>
</tbody></table>
<p><b>Concepts:</b> depletion ‚Üí fossil fuels; criticality ‚Üí rare-earth metals; circularity ‚Üí recycling. <b>Emerging technologies</b> = promising tech at an early stage (lab/concept/demo).</p>
<div class="keybox"><div class="th">Collingridge dilemma</div><p>Early on a technology is <b>easy to change but its impacts are unknown</b>; later the impacts are known but it is <b>locked in</b>. Knowledge vs control, over time.</p></div>
<p><b>RRI</b> = a participative, value-driven approach. Four criteria: <b>anticipation, inclusiveness, reflexivity, responsiveness.</b> Four LCA+RRI design principles: <b>transdisciplinary</b>, <b>open up perspectives</b>, <b>explore & communicate uncertainty</b>, <b>anticipate (not predict) futures</b> ‚Äî a fixed "LCA-then-RRI" order is not one of them.</p>
<div class="trapbox"><div class="th">Trap</div><p><b>Sustainable value</b> is broader than long-term profit ‚Äî it spans People, Planet & Profit. LCA and sustainable business models are <b>interdependent</b> and set mutual requirements (neither strictly comes "first").</p></div>
`;

BIBLE.scba = `
<p class="lead">The calculation-heavy MOOC. Learn the formulas cold (NPV, IRR, BCR, rule of half, VSL, expected value, distributional weights) and the decision rules that go with them. The conceptual half is stakeholders, welfare criteria, effect types, non-market valuation, risk vs uncertainty, and equity. The worked numbers below are the exact ones tested.</p>

<h3>M1 ¬∑ Foundations</h3>
<p><b>NSB = B ‚àí C</b> (Net Social Benefit): total benefits to society minus total costs; positive ‚üπ socially beneficial. SCBA broadens private CBA from firm profit to <b>industry-wide and societal</b> impacts, including third-party externalities. It is used <b>ex-ante</b> (plan/justify), <b>ex-post</b> (assess outcomes), and <b>in-medias-res</b> (mid-course correction).</p>
<div class="keybox"><div class="th">Stakeholders &amp; key terms</div><p>Stakeholder groups: <b>operators</b>, <b>users/consumers</b>, <b>public institutions</b>, <b>non-users/broader society</b> ‚Äî but <b>not animals/ecosystems</b> (valued as environmental effects, not 'stakeholders'). Stakeholder analysis exposes who gains/loses (hidden winners &amp; losers). <b>Opportunity cost</b> = value of the next-best forgone alternative (always include the <b>zero / base-case</b> option). <b>Tangible</b> = monetisable (construction, fuel savings); <b>intangible</b> = hard to price (clean air, safety) ‚Äî include both. Policy documents supply the <b>legal framework &amp; context</b> the SCBA must align with.</p></div>

<h3>M2 ¬∑ Discounting</h3>
<p>A euro today &gt; a euro later (it can earn interest). The <b>discount rate r</b> converts future values to present worth ‚Äî the NL standard is ‚âà <b>5.5%</b>. <b>Higher r ‚Üí lower NPV</b> (distant cash flows shrink); <b>lower r ‚Üí higher NPV</b>. For climate, a high rate undervalues far-future benefits (avoided damages), discouraging mitigation ‚Äî the <b>intergenerational-equity</b> debate.</p>
<div class="formula"><span class="hl">NPV = Œ£ (B‚Çú ‚àí C‚Çú) / (1 + r)·µó</span> &nbsp;¬∑&nbsp; Future value (compounding forward) = PV √ó (1 + r)·µó</div>

<h3>M3 ¬∑ NPV, IRR &amp; BCR</h3>
<div class="keybox"><div class="th">Decision rules</div><p><b>NPV</b> &gt; 0 ‚Üí accept (absolute net benefit; the master rule). &nbsp; <b>IRR</b> = the rate where NPV = 0; accept if <b>IRR &gt; discount rate</b>. &nbsp; <b>BCR</b> = PV benefits √∑ PV costs; accept if <b>BCR &gt; 1</b>. For mutually exclusive projects, <b>rank by NPV</b>.</p></div>
<p><b>IRR pitfalls:</b> alternating cash flows give <b>multiple IRRs</b>; IRR ignores project <b>size</b>; and it assumes interim cash is <b>reinvested at the IRR</b> (often unrealistically high), so it can <b>overstate</b> value. NPV assumes reinvestment at the discount rate ‚Äî more conservative. The <b>crossover rate</b> is where two projects' NPVs are equal (found via the incremental IRR of A‚àíB):</p>

<h3>M4 ¬∑ Welfare</h3>
<p><b>Pareto:</b> a change is good only if someone gains and <b>no one</b> is worse off (too strict). <b>Kaldor-Hicks:</b> good if winners <b>could</b> compensate losers (hypothetical compensation; net benefit positive) ‚Äî practical but ignores who actually bears the cost. <b>Loss aversion</b> (prospect theory) complicates it: losses hurt more than equal gains. <b>Consumer surplus</b> = WTP ‚àí price paid. The <b>rule of half</b> estimates the welfare gain from a price drop:</p>
<div class="formula"><span class="hl">ŒîCS = (P0 ‚àí P1)¬∑Q0 + ¬Ω(P0 ‚àí P1)(Q1 ‚àí Q0)</span></div>

<h3>M5 ¬∑ Direct, indirect &amp; external effects</h3>
<p><b>Direct</b> = primary (targeted) market ‚Äî prices, quantities, surplus. <b>Indirect</b> = secondary/related markets via supply chains, substitutes/complements (an EV subsidy cuts gasoline demand). <b>External</b> = third-party effects not in market prices (pollution, cleaner air) ‚Äî a market failure needing non-market valuation. One stakeholder can feel <b>both</b> direct and indirect effects. <b>Double counting</b> = counting the same effect twice (e.g. tourism revenue <em>and</em> its sales tax). Flyvbjerg &amp; Bester: rail projects average <b>+40% cost overrun, ‚àí34% benefits</b> (optimism bias / strategic misrepresentation).</p>
<div class="trapbox"><div class="th">Trap</div><p>External cost of a pool = <b>sewage pollution</b> (third parties), not construction/revenue/scrap. An EV subsidy is an <b>indirect</b> effect that <b>decreases</b> gasoline demand. Value externalities with <b>contingent valuation</b> (or hedonic pricing / damage costs).</p></div>

<h3>M6 ¬∑ Valuing non-market goods</h3>
<p><b>Public goods</b> are <b>non-excludable</b> and <b>non-rivalrous</b> (clean air, national defense, a public beach) ‚Äî markets under-provide them. The <b>Total Economic Value (TEV)</b> framework splits worth into use and non-use values:</p>
<table class="zebra"><thead><tr><th>Type</th><th>Subtype</th><th>Example</th></tr></thead><tbody>

<tr><td>Indirect use</td><td>Flood control, air purification</td></tr>
<tr><td>Option value</td><td>Keeping biodiversity for future medicine</td></tr>
<tr><td rowspan="2"><b>Non-use</b></td><td>Existence value</td><td>WTP to protect whales you'll never see</td></tr>
<tr><td>Bequest value</td><td>Preserving rainforest for future generations</td></tr>
</tbody></table>
<p><b>Revealed</b> preference reads behaviour (travel cost, hedonic pricing ‚Äî use values only); <b>stated</b> preference asks directly (<b>Contingent Valuation Method</b>, captures non-use values, but suffers <b>hypothetical bias</b> &amp; <b>cognitive burden</b>). Plug WTP in for B‚Çú in the NPV formula. <b>LCA + TEV</b> together ‚Üí better social &amp; environmental decisions (LCA diagnoses impacts, TEV prices them).</p>
<div class="trapbox"><div class="th">Worked traps</div><p><b>Total WTP</b>: 70% of 100,000 √ó ‚Ç¨15 + 30% √ó ‚Ç¨5 = 1,050,000 + 150,000 = <b>‚Ç¨1,200,000</b>. &nbsp; <b>Average WTP</b>: 0.6√ó18 + 0.4√ó8 = <b>‚Ç¨14.00</b>. &nbsp; Non-excludable + non-rival = <b>public beach / national defense</b>.</p></div>

<h3>M7 ¬∑ Risk &amp; uncertainty</h3>
<p><b>Risk</b> = outcomes <em>and</em> probabilities known (modellable). <b>Uncertainty</b> = probabilities can't be reliably estimated. <b>Expected value</b> models a 'game against nature' (states must be mutually exclusive &amp; collectively exhaustive) and assumes <b>risk neutrality</b>:</p>

<p>Tests how robust conclusions are to changed assumptions (it does <b>not</b> give probabilities). <b>Partial</b> = vary one input at a time; <b>best/worst-case</b> = stack favourable vs unfavourable inputs; <b>Monte Carlo</b> = sample <b>all</b> uncertain inputs simultaneously (handles interdependent variables) ‚Üí a distribution of NPVs. A <b>tornado diagram</b> ranks variables by influence. Excel <b>Goal Seek</b> finds the input that hits a target (e.g. NPV = 0 break-even). Communicating uncertainty serves <b>transparency</b>.</p>

<p class="lead">A philosophy-heavy MOOC. It runs on three triplets ‚Äî <b>intended/embedded/realized</b> value, VSD's <b>conceptual/empirical/technical</b> investigations, and the <b>values ‚Üí norms ‚Üí design requirements</b> hierarchy ‚Äî plus five value-conflict methods, technological mediation, and the four responsible-innovation criteria. Almost no calculation; learn the definitions, the distinctions, and the cases.</p>

<h3>M2 ¬∑ Embedding values</h3>
<p>Values get <b>embedded</b> in artifacts through design. Robert Moses' low overpasses (Winner, <em>Do artifacts have politics?</em>) embed a <b>disvalue</b> ‚Äî racism ‚Äî by blocking buses; a speed bump embeds the positive value of safety. The key tool is the <b>use plan</b>: a (often tacit) description of how a technology is meant to be used and for what purpose.</p>

<h3>M4 ¬∑ Stakeholders &amp; sources of value</h3>
<p><b>Direct</b> stakeholders use the tech or have a formal role (e.g. regulators); <b>indirect</b> ones are affected without using it (bystanders, future generations) ‚Äî include both. When you can't reach them, build a <b>persona</b> (a fictional stakeholder) and imagine a day in their life. You are not a "hired gun": weigh stakeholder values but apply your own normative judgement. The crash-dummy-as-average-male case shows bias from overlooking stakeholders.</p>
<div class="keybox"><div class="th">Four sources of value</div><p>(1) the <b>design brief</b> ¬∑ (2) <b>stakeholder</b> values ¬∑ (3) <b>designer / professional</b> values ¬∑ (4) <b>social values</b> in laws, codes &amp; standards. <b>Codes</b> = legally enforced requirements; <b>standards</b> = expert recommendations. These sources surface candidate values but do <b>not</b> answer the normative question of which values <em>ought</em> to be included.</p></div>

<h3>M5 ¬∑ Conceptualization &amp; specification</h3>
<p><b>Conceptualization</b> = a (largely philosophical, context-free) definition of what a value means. <b>Specification</b> = translating it into context-specific norms and design requirements.</p>

<tr><td><b>Well-being</b></td><td>Hedonism (pleasure) ¬∑ desire-satisfaction ¬∑ objective-list (capabilities, e.g. Nussbaum)</td></tr>
<tr><td><b>Health</b></td><td>WHO: complete physical, mental &amp; social well-being ‚Äî not just absence of disease</td></tr>
<tr><td><b>Safety / Security</b></td><td>Safety = vs <b>unintentional</b> harm ¬∑ security = vs <b>intentional</b> harm</td></tr>
<tr><td><b>Privacy</b></td><td>'right to be left alone' ¬∑ control over information ¬∑ <b>contextual integrity</b> (Nissenbaum)</td></tr>
<tr><td><b>Justice</b></td><td>Giving people what they deserve (‚âÝ equality); distributive / procedural / recognition</td></tr>
</tbody></table>

<h3>M6 ¬∑ Value conflicts</h3>
<p>A <b>value conflict</b> = you can't fully respect all relevant values at once. Five methods, each with trade-offs:</p>
<div class="keybox"><div class="th">Five methods</div><p><b>1 Cost-benefit analysis</b> ‚Äî everything in one (money) unit ¬∑ <b>2 Multi-criteria analysis</b> ‚Äî weighted scores, no single unit ¬∑ <b>3 Thresholds</b> ‚Äî minimum acceptable level per value ¬∑ <b>4 Respecification</b> ‚Äî reason about values &amp; redefine requirements ¬∑ <b>5 Innovation</b> ‚Äî invent a new option.</p></div>
<table class="zebra"><thead><tr><th>Method</th><th>Weighs values by‚Ä¶</th><th>Main weakness</th></tr></thead><tbody>
<tr><td>Cost-benefit</td><td>Common monetary unit</td><td>Treats values as commensurable; hard to monetise moral values</td></tr>
<tr><td>Multi-criteria</td><td>Weighted scores (w‚±º=Œ£g·µ¢¬∑v·µ¢‚±º)</td><td>Still commensurable; result can depend on the scale chosen</td></tr>
<tr><td>Thresholds</td><td>Min level per value</td><td>May achieve less than possible; thresholds not truly independent</td></tr>
<tr><td>Respecification</td><td>Reasoning / judgement</td><td>Doesn't solve every conflict</td></tr>
<tr><td>Innovation</td><td>New technical option</td><td>Usually no <em>definitive</em> solution</td></tr>
</tbody></table>
<p><b>CBA</b> uses a <b>discount rate</b> (a dollar now &gt; a dollar later) and 'contingent valuation' (willingness-to-pay) to price non-market values; maximising human happiness links it to <b>utilitarianism</b>. <b>MCA</b>'s formula is only meaningful on a <b>ratio scale</b> with a common unit ‚Äî scales rank <b>ordinal ‚Üí interval ‚Üí ratio</b> (only ratio allows all arithmetic). <b>Incommensurable</b> values share no common measure; <b>value monism</b> says one super-value underlies all.</p>
<div class="trapbox"><div class="th">High-yield case</div><p><b>Refrigerant (CFC-12 replacement):</b> respecifying safety from "non-flammable coolant" to "low explosion risk of the whole fridge" made flammable <b>isobutane</b> acceptable over <b>HFC-134a</b> ‚Äî far lower GWP. The <b>Eastern Scheldt</b> storm-surge barrier solved safety-vs-ecology by <b>innovation</b>. No method is definitive.</p></div>

<h3>M7 ¬∑ Moralization of technology</h3>
<p><b>Prototyping, testing &amp; monitoring</b> check three things: is the intended value embedded, is it realised in use, and are new values needed? <b>Certification</b> judges conformity to technical norms/standards. <b>Technological mediation</b> (Latour, Ihde, Verbeek): tech is never a neutral intermediary ‚Äî it shapes perception and action. <b>Moralization</b> uses design to steer users' (moral) behaviour, on a spectrum:</p>

<p class="lead">Two halves: <b>IP / patents</b> and <b>standards</b>. Mostly definitions and "which one is true" lists. The biggest traps are the IP-type attributes, the patent-pool restriction, and the SSO-type table.</p>

<h2 style="font-size:17px;margin:6px 0 2px;color:var(--gold)">PART A ¬∑ Intellectual Property</h2>

<h3>The forms of IP</h3>
<table class="zebra"><thead><tr><th>Right</th><th>Protects</th><th>How obtained ¬∑ term</th></tr></thead><tbody>
<tr><td><b>Patent</b></td><td>Technical inventions (function)</td><td>Application + examination; <b>territorial</b> government grant; ~20 yr</td></tr>
<tr><td><b>Copyright</b></td><td><b>Expression</b> (text, code, music, motion pictures) ‚Äî not ideas</td><td><b>Automatic</b> on creation; life + &gt;50 yr</td></tr>
<tr><td><b>Design right</b></td><td>Appearance/look (not features dictated solely by function)</td><td><b>Registration</b> (no novelty search); ~10‚Äì25 yr</td></tr>
<tr><td><b>Trademark</b></td><td>Distinctive signs (logo, name)</td><td>Application; renewable <b>indefinitely</b></td></tr>
<tr><td><b>Trade secret</b></td><td>Confidential business info</td><td><b>Not a formal IPR</b> ‚Äî no specific IP law; protected by secrecy/contract</td></tr>
</tbody></table>
<div class="trapbox"><div class="th">Traps</div><p>"Which is <b>NOT</b> an IPR?" ‚Äî usually all listed <b>are</b> (geographical indications <b>is</b> an IPR). Copyright is <b>automatic</b>; design rights need <b>registration</b>; trademarks last <b>forever</b> if renewed; trade secrets have <b>no specific law</b>.</p></div>

<h3>Patentability ‚Äî 5 conditions</h3>
<div class="keybox"><div class="th">All five required</div><p>(1) <b>Novelty</b> ¬∑ (2) <b>Inventive step</b> (non-obvious) ¬∑ (3) <b>Industrial applicability</b> ¬∑ (4) <b>Patentable subject matter</b> ¬∑ (5) <b>Sufficiency of disclosure</b> (enabling).</p></div>
<p><b>Excluded subject matter:</b> discoveries, scientific theories, mathematical methods, aesthetic creations, schemes/rules for mental acts or business, and mere presentations of information (as such). A patent is a <b>bargain</b>: full public disclosure in exchange for a temporary monopoly.</p>
<p><b>Kind codes:</b> <code>A</code> = published application, <code>B</code> = granted patent. A <b>patent family</b> = the same invention filed in multiple jurisdictions.</p>

<h3>Ownership &amp; compensation</h3>
<ul>
<li>Default owner is the <b>inventor</b>, but employee inventions are usually <b>assigned</b> to the employer.</li>
<li>Mandatory <b>employee-inventor compensation</b> exists only in <b>some countries</b> (Germany is the classic case) ‚Äî not everywhere.</li>
<li><b>Transfer ‚âÝ licence:</b> selling/assigning transfers ownership; licensing grants use while you keep ownership.</li>
</ul>

<h3>Six IP strategies</h3>
<div class="keybox"><div class="th">The list (patent pooling is NOT one of them)</div><p>(1) <b>Preserve exclusivity</b> ¬∑ (2) <b>License out</b> ¬∑ (3) <b>Cross-license</b> ¬∑ (4) <b>Defensive</b> publishing/patenting ¬∑ (5) <b>Create intangible assets</b> (reputation, bargaining chips) ¬∑ (6) <b>Block competitors' routes</b>.</p></div>
<p>SMEs often <b>lack a portfolio to cross-license</b>, so exclusivity/defensive routes matter more for them.</p>

<h3>Pools, trolls, privateers</h3>
<ul>
<li><b>Patent pool:</b> several owners license a bundle jointly. Competition law allows pooling only <b>complementary</b> patents ‚Äî pooling <b>substitutes</b> would kill competition.</li>
<li><b>NPE</b> (non-practising entity): owns patents but makes nothing. <b>Not all NPEs are trolls</b> (universities, research labs are NPEs too).</li>
<li><b>Troll</b> tactic = exploit the implementer's <b>sunk cost / lock-in</b> (you've already invested, so you'll pay rather than redesign).</li>
<li><b>Privateer:</b> a firm transfers patents to a third party that asserts them against the firm's rivals, keeping the firm's own reputation clean.</li>
<li><b>Infringement</b> = using a protected invention <b>without permission</b> (independent re-invention is no defence for patents).</li>
</ul>

<h3>Patent searching</h3>
<p>The <b>concept approach</b>: group synonyms per concept and combine ‚Äî <code>(a OR b) AND (c OR d)</code> ‚Üí the <b>intersection</b> of concept sets, which focuses results. Searching is never exhaustive; classification codes (IPC/CPC) help.</p>

<h2 style="font-size:17px;margin:22px 0 2px;color:var(--gold)">PART B ¬∑ Standards</h2>

<h3>What a standard is</h3>
<ul>
<li><b>ISO definition:</b> a document, established by consensus and approved by a recognised body, that provides rules/guidelines/characteristics for common and repeated use, aiming at the optimum degree of order.</li>
<li>Standards are <b>variety-reducing</b> ‚Üí enable <b>mass production</b>, interchangeability, and trade (you can ship product worldwide). Roles: compatibility/interface, minimum quality/safety, variety reduction, information.</li>
<li><b>Product-labelling</b> standards primarily serve the <b>environment</b>/consumer information.</li>
</ul>

<h3>De-facto vs de-jure</h3>
<table class="zebra"><thead><tr><th>De-facto</th><th>De-jure</th></tr></thead><tbody>
<tr><td>Adopted by the <b>market</b>, no formal process (QWERTY, VHS)</td><td>Set through a <b>formal</b> process; <b>de-jure when referenced by law</b></td></tr>
</tbody></table>
<p>Standardisation creates <b>winners and losers</b> (whoever's tech is/ isn't chosen).</p>

<h3>Six open-standard principles (WTO/TBT)</h3>
<div class="keybox"><div class="th">The six</div><p><b>Transparency</b> ¬∑ <b>Openness</b> ¬∑ <b>Impartiality &amp; consensus</b> ¬∑ <b>Effectiveness &amp; relevance</b> ¬∑ <b>Coherence</b> ¬∑ <b>Development dimension</b>.</p></div>
<div class="trapbox"><div class="th">Trap</div><p>If a <b>single interest group funds and steers</b> a standard, the principle broken is <b>impartiality &amp; consensus</b>.</p></div>

<h3>Standard-setting organisations (SSO types)</h3>
<table class="zebra"><thead><tr><th>Type</th><th>Recognised?</th><th>Membership</th><th>Open?</th></tr></thead><tbody>
<tr><td><b>Formal</b> (ISO, IEC, CEN)</td><td>Yes</td><td><b>Indirect</b> (via national bodies)</td><td>Open</td></tr>
<tr><td><b>Quasi-formal</b> (ITU-type)</td><td><b>No</b></td><td><b>Direct</b></td><td>Open</td></tr>
<tr><td><b>Fora / consortia</b> (W3C, IEEE-SA‚Ä¶)</td><td>No</td><td>Direct</td><td><b>Usually not</b> open</td></tr>
</tbody></table>
<p><b>Indirect membership</b> = you participate through your national standards body (e.g. NEN for NL). ISO is <b>global</b>; CEN is European.</p>

<h3>EU standardisation &amp; the New Approach</h3>
<ul>
<li>A <b>Directive</b> sets <b>essential requirements</b>; an <b>ESO</b> (CEN/CENELEC/ETSI) develops a <b>harmonised standard</b> that meets them.</li>
<li>Meeting a harmonised standard gives a <b>presumption (assumption) of conformity</b> ‚Üí CE mark / Declaration of Conformity. You may prove conformity another way, but then the <b>burden of proof is on you</b>.</li>
<li>Sequence: Directive (essential requirements) ‚Üí mandate to ESO ‚Üí harmonised standard ‚Üí presumption of conformity ‚Üí CE marking.</li>
</ul>

<h3>Reading standards documents</h3>
<ul>
<li><b>Normative</b> references/clauses are <b>mandatory</b> (you must comply); <b>informative</b> ones are guidance only.</li>
<li><b>"shall"</b> = requirement (mandatory); <b>"should"</b> = recommendation; <b>"may"</b> = permission; <b>"can"</b> = possibility.</li>
<li>Standards are normally <b>copyrighted and sold</b>, but <b>NEN standards are free</b> when made <b>mandatory by Dutch law</b>.</li>
</ul>

const MOOC_BY={}; MOOCS.forEach(m=>{ MOOC_BY[m.id]=m; });

/* Dutch grade ‚Äî matches the official 48-Q formula, scales to any total */
function grade(correct,total){
  const cutoff=Math.round(total*0.31);
  if(correct<=cutoff) return 1;
  const k=9/(total-cutoff);
  return Math.max(1, Math.min(10, 10-(total-correct)*k));
}
function gradeColor(g){ return g>=8?'var(--green)':(g>=5.5?'var(--gold)':'var(--red)'); }
function pctColor(p){ return p>=75?'var(--green)':(p>=50?'var(--gold)':'var(--red)'); }

/* ---------- countdown ---------- */
function startCountdown(){
  const target=new Date(2026,5,24,18,0,0);
  const cd=$('countdown'); if(!cd) return;
  function tick(){
    let diff=target-new Date();
    if(diff<=0){ cd.innerHTML='Exam time ‚Äî <b>good luck!</b>'; return; }
    const d=Math.floor(diff/86400000); diff-=d*86400000;
    const h=Math.floor(diff/3600000); diff-=h*3600000;
    const mi=Math.floor(diff/60000);
    cd.innerHTML='Exam in <b>'+(d>0?d+'d ':'')+h+'h '+mi+'m</b><br>Wed 24 Jun ¬∑ 18:00';
  }
  tick(); setInterval(tick,30000);
}

function initKeyboard(){
  document.addEventListener('keydown', function(e){
    if(e.ctrlKey||e.metaKey||e.altKey) return;
    const t=e.target; if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.tagName==='SELECT')) return;
    const id=CUR;
    let pos=-1;
    if(e.key>='1'&&e.key<='4') pos=+e.key-1;
    else { const k=(e.key||'').toLowerCase(); if(k>='a'&&k<='d') pos='abcd'.indexOf(k); }
    if(MOOC_BY[id] && drills[id]){
      const d=drills[id];
      if(d.ended) return;
      if(pos>=0){ drillChoose(id,pos); e.preventDefault(); return; }
      if(e.key==='ArrowLeft'){ drillNav(id,-1); e.preventDefault(); }
      else if(e.key==='ArrowRight'||e.key==='Enter'){ (d.idx===d.pool.length-1)?drillFinish(id):drillNav(id,1); e.preventDefault(); }
    } else if((id==='ex1'||id==='ex2'||id==='ex3') && exams[id]){
      const ex=exams[id];
      if(ex.mode==='results') return;
      if(pos>=0 && ex.mode==='taking'){ examPick(id,pos); e.preventDefault(); return; }
      if(e.key==='ArrowLeft'){ examNav(id,-1); e.preventDefault(); }
      else if(e.key==='ArrowRight'||e.key==='Enter'){ examNav(id,1); e.preventDefault(); }
    }
  });
}

}

/* ---------- drill ---------- */
function drillModes(id){
  const m=MOOC_BY[id], bank=BANKS[id];
  if(m.group==='m'){
    const mods=[...new Set(bank.map(q=>q.m))].sort((a,b)=>a-b);
    return mods.map(n=>({key:'m'+n,label:'M'+n}));
  }
  const tops=[...new Set(bank.map(q=>q.t).filter(Boolean))];
  return tops.map(t=>({key:'t:'+t,label:t}));
}
function drillFilter(id,key){
  const bank=BANKS[id];
  if(key==='all') return bank.slice();
  if(key==='trap') return bank.filter(q=>q.trap);
  if(/^m\d+$/.test(key)){ const n=+key.slice(1); return bank.filter(q=>q.m===n); }
  if(key.indexOf('t:')===0){ const t=key.slice(2); return bank.filter(q=>q.t===t); }
  return bank.slice();
}
function drillInit(id){
  const m=MOOC_BY[id], bank=BANKS[id];
  const traps=bank.filter(q=>q.trap).length;
  const modeList=[{key:'all',label:'All ¬∑ '+bank.length}];
  if(traps) modeList.push({key:'trap',label:'‚òÖ Your traps ¬∑ '+traps,trap:true});
  drillModes(id).forEach(md=>modeList.push(md));
  drills[id]={modeList,modeIdx:0,pool:[],idx:0,ans:[],ended:false};
  let chips='';
  modeList.forEach((md,i)=>{ chips+='<button class="chip'+(i===0?' on':'')+(md.trap?' trap':'')+'" data-idx="'+i+'">'+md.label+'</button>'; });
  $('page-'+id).innerHTML=
    '<div class="eyebrow">MOOC '+m.n+' ¬∑ Drill</div>'+
    '<h1 class="h-title">'+m.name+'</h1>'+
    '<div class="h-sub">'+m.tag+' ‚Äî pick an answer for instant feedback, and use Prev / Next to move through (and revisit) questions like the real exam. <span style="opacity:.65">Keyboard: <b>1‚Äì4</b> answer ¬∑ <b>‚Üê ‚Üí</b> move.</span></div>'+
    '<div class="modes" id="modes-'+id+'">'+chips+'</div>'+
    '<div id="run-'+id+'"></div>';
  document.querySelectorAll('#modes-'+id+' .chip').forEach(c=>c.addEventListener('click',function(){ drillSetMode(id,+c.dataset.idx); }));
  built[id]=true;
  drillSetMode(id,0);
}
function drillSetMode(id,i){
  const d=drills[id]; const md=d.modeList[i];
  document.querySelectorAll('#modes-'+id+' .chip').forEach(c=>c.classList.toggle('on',+c.dataset.idx===i));
  d.modeIdx=i; d.pool=shuffle(drillFilter(id,md.key)); d.idx=0; d.ans=new Array(d.pool.length); d.ended=false;
  drillRender(id);
}
function drillRender(id){
  const d=drills[id], run=$('run-'+id);
  if(d.ended){ drillEnd(id); return; }
  const i=d.idx, q=d.pool[i];
  if(!d.ans[i]) d.ans[i]={order:shuffle([0,1,2,3]),chosen:null};
  const a=d.ans[i], correctPos=a.order.indexOf(0), answered=a.chosen!==null;
  const tag=(q.m!=null)?('Module '+q.m):(q.t||'');
  let opts='';
  a.order.forEach((orig,pos)=>{
    let cls='opt';
    if(answered){ if(pos===correctPos) cls+=' correct'; else if(pos===a.chosen) cls+=' wrong'; }
    opts+='<button class="'+cls+'"'+(answered?' disabled':'')+' onclick="drillChoose(\''+id+'\','+pos+')"><span class="opt-key">'+LETTERS[pos]+'</span><span>'+q.o[orig]+'</span></button>';
  });
  let fb='';
  if(answered){ const right=a.chosen===correctPos;
    fb='<div class="fb show '+(right?'good':'bad')+'"><div class="fb-head">'+(right?'‚úì Correct':'‚úó Not quite')+'</div><div class="fb-body">'+q.e+(right?'':'<span class="wd">Correct answer ‚Äî <b>'+LETTERS[correctPos]+'</b>: '+q.o[0]+'</span>')+'</div></div>'; }
  const answeredCount=d.ans.filter(x=>x&&x.chosen!==null).length;
  const isFirst=i===0, isLast=i===d.pool.length-1;
  const prevBtn='<button class="btn ghost"'+(isFirst?' disabled':'')+' onclick="drillNav(\''+id+'\',-1)">‚Üê Prev</button>';
  const nextBtn=isLast?'<button class="btn" onclick="drillFinish(\''+id+'\')">See results ‚Üí</button>':'<button class="btn" onclick="drillNav(\''+id+'\',1)">Next ‚Üí</button>';
  run.innerHTML=
    '<div class="card">'+
      '<div class="q-meta"><span class="q-tag"><b>'+tag+'</b></span>'+(q.trap?'<span class="trapflag">‚òÖ YOUR TRAP</span>':'')+'</div>'+
      '<div class="q-text">'+q.q+'</div>'+
      '<div class="opts">'+opts+'</div>'+fb+
      '<div class="foot"><span>'+prevBtn+'</span>'+
        '<span class="prog">Q '+(i+1)+' / '+d.pool.length+' ¬∑ '+answeredCount+' answered</span>'+
        '<span>'+nextBtn+'</span></div>'+
    '</div>';
}
function drillChoose(id,pos){
  const d=drills[id], a=d.ans[d.idx];
  if(!a||a.chosen!==null) return;
  a.chosen=pos; drillRender(id);
}
function drillNav(id,dir){ const d=drills[id]; d.idx=Math.max(0,Math.min(d.pool.length-1,d.idx+dir)); drillRender(id); }
function drillFinish(id){ drills[id].ended=true; drillEnd(id); }
function drillEnd(id){
  const d=drills[id], run=$('run-'+id);
  let answered=0, correct=0; const misses=[];
  d.ans.forEach((a,i)=>{ if(a&&a.chosen!==null){ answered++; const cp=a.order.indexOf(0); if(a.chosen===cp) correct++; else misses.push(d.pool[i]); } });
  d.lastMisses=misses;
  const total=d.pool.length, skipped=total-answered;
  const pct=answered?Math.round(correct/answered*100):0;
  const prev=STATE.best[id]; if(answered && (!prev||pct>prev.pct)) STATE.best[id]={pct,correct,total:answered};
  let msg;
  if(pct>=90) msg='Exam-ready on this MOOC. <b>Lock it in.</b>';
  else if(pct>=75) msg='Solid. Re-run <b>your traps</b> and the misses below.';
  else if(pct>=50) msg='Getting there ‚Äî read this MOOC in the <b>Bible</b>, then run again.';
  else msg='Start with the <b>Bible</b> section for this MOOC, then drill again.';
  let missH='';
  if(misses.length){ missH='<div class="miss"><div class="miss-h">Review these ('+misses.length+')</div>'+misses.map(q=>'<div class="miss-item">'+q.q+' <b>‚Üí '+q.o[0]+'</b></div>').join('')+'</div>'; }
  const skipH=skipped>0?'<div class="end-msg" style="font-size:13px;color:var(--muted)">'+skipped+' question'+(skipped>1?'s':'')+' skipped (not counted in the score).</div>':'';
  run.innerHTML=
    '<div class="card end">'+
      '<div class="end-pct" style="color:'+pctColor(pct)+'">'+pct+'%</div>'+
      '<div class="end-lbl">'+correct+' / '+answered+' correct</div>'+
      '<div class="end-msg">'+msg+'</div>'+skipH+missH+
      '<div class="restart">'+(misses.length?'<button class="btn" onclick="drillRetryMisses(\''+id+'\')">Retry these '+misses.length+' ‚Üí</button>':'')+
        '<button class="btn'+(misses.length?' ghost':'')+'" onclick="drillSetMode(\''+id+'\','+d.modeIdx+')">Run again</button>'+
        '<button class="btn ghost" onclick="go(\'bible\')">Open Bible</button></div>'+
    '</div>';
}

function drillRetryMisses(id){
  const d=drills[id]; if(!d.lastMisses||!d.lastMisses.length) return;
  d.pool=shuffle(d.lastMisses); d.idx=0; d.ans=new Array(d.pool.length); d.ended=false;
  document.querySelectorAll('#modes-'+id+' .chip').forEach(c=>c.classList.remove('on'));
  drillRender(id);
}

function examInit(id){
  const ex=EXAMS[id];
  $('page-'+id).innerHTML=
    '<div class="eyebrow">Practice exam</div>'+
    '<h1 class="h-title">'+ex.title+'</h1>'+
    '<div class="h-sub">'+ex.blurb+'</div>'+
    '<div id="run-'+id+'">'+
      '<div class="panel"><h3>How it works</h3>'+
        '<ul><li><b>'+ex.Q.length+' questions</b> ¬∑ '+ex.sections.length+' sections of '+(ex.Q.length/ex.sections.length)+'.</li>'+
        '<li>Answer in any order ‚Äî use <b>‚Üê Prev / Next ‚Üí</b> to move and change answers freely, exactly like the real exam. <span style="opacity:.65">(Keyboard: <b>1‚Äì4</b> to pick, <b>‚Üê ‚Üí</b> to move.)</span></li>'+
        '<li>Hit <b>Submit</b> when ready for a grade, a per-section breakdown, and a full answer review.</li></ul>'+
        '<div class="restart" style="justify-content:flex-start"><button class="btn" onclick="examStart(\''+id+'\')">Start exam ‚Üí</button></div></div>'+
    '</div>';
  built[id]=true;
}
function examStart(id){
  const ex=EXAMS[id];
  exams[id]={idx:0,ans:new Array(ex.Q.length).fill(null),mode:'taking'};
  examRender(id);
}
function examRender(id){
  const ex=EXAMS[id], e=exams[id], run=$('run-'+id);
  const i=e.idx, q=ex.Q[i], review=e.mode==='review', chosen=e.ans[i];
  let opts='';
  q.o.forEach((opt,oi)=>{
    let cls='opt';
    if(review){ if(oi===q.c) cls+=' correct'; else if(oi===chosen) cls+=' wrong'; }
    else if(oi===chosen) cls+=' sel';
    opts+='<button class="'+cls+'"'+(review?' disabled':'')+' onclick="examPick(\''+id+'\','+oi+')"><span class="opt-key">'+LETTERS[oi]+'</span><span>'+opt+'</span></button>';
  });
  const answeredCount=e.ans.filter(x=>x!==null).length;
  let fb='';
  if(review){ const right=chosen===q.c;
    fb='<div class="fb show '+(right?'good':'bad')+'"><div class="fb-head">'+(right?'‚úì Correct':(chosen===null?'‚Äî Not answered':'‚úó Incorrect'))+'</div><div class="fb-body">'+q.e+(right?'':'<span class="wd">Correct ‚Äî <b>'+LETTERS[q.c]+'</b>: '+q.o[q.c]+'</span>')+'</div></div>'; }
  const isFirst=i===0, isLast=i===ex.Q.length-1;
  const prevBtn='<button class="btn ghost"'+(isFirst?' disabled':'')+' onclick="examNav(\''+id+'\',-1)">‚Üê Prev</button>';
  const nextBtn='<button class="btn ghost"'+(isLast?' disabled':'')+' onclick="examNav(\''+id+'\',1)">Next ‚Üí</button>';
  const action=review
    ? '<button class="btn" onclick="examEnd(\''+id+'\')">Back to results ‚Üí</button>'
    : '<button class="btn" onclick="examSubmit(\''+id+'\')">Submit exam ‚úì</button>';
  run.innerHTML=
    '<div class="card">'+
      '<div class="q-meta"><span class="q-tag"><b>'+q.sec+'</b></span><span class="q-tag">Q '+(i+1)+' / '+ex.Q.length+(review?' ¬∑ review':'')+'</span></div>'+
      '<div class="q-text">'+q.q+'</div>'+
      (q.fig?'<div class="q-fig">'+q.fig+'</div>':'')+
      '<div class="opts">'+opts+'</div>'+fb+
      '<div class="foot"><span>'+prevBtn+'</span>'+
        '<span class="prog">'+answeredCount+' / '+ex.Q.length+' answered</span>'+
        '<span>'+nextBtn+'</span></div>'+
      '<div class="submitbar">'+action+'</div>'+
    '</div>';
}
function examPick(id,oi){ const e=exams[id]; if(e.mode==='review') return; e.ans[e.idx]=oi; examRender(id); }
function examNav(id,dir){ const e=exams[id], ex=EXAMS[id]; e.idx=Math.max(0,Math.min(ex.Q.length-1,e.idx+dir)); examRender(id); }
function examSubmit(id){
  const e=exams[id];
  const un=e.ans.filter(x=>x===null).length;
  if(un>0 && !window.confirm(un+' question'+(un>1?'s are':' is')+' still unanswered. Submit anyway?')) return;
  e.mode='results'; examEnd(id);
}
function examEnd(id){
  const ex=EXAMS[id], e=exams[id], run=$('run-'+id);
  e.mode='results';
  const total=ex.Q.length; let correct=0; const sec={}; ex.sections.forEach(s=>{ sec[s]={c:0,n:0}; });
  ex.Q.forEach((q,i)=>{ sec[q.sec].n++; if(e.ans[i]===q.c){ correct++; sec[q.sec].c++; } });
  const g=grade(correct,total), pct=Math.round(correct/total*100);
  let rows='';
  ex.sections.forEach(s=>{ const o=sec[s]; const sp=o.n?Math.round(o.c/o.n*100):0;
    rows+='<div class="secrow"><span class="nm">'+s+'</span><span class="bar"><i style="width:'+sp+'%;background:'+pctColor(sp)+'"></i></span><span class="sc">'+o.c+'/'+o.n+'</span></div>'; });
  run.innerHTML=
    '<div class="card">'+
      '<div class="gradeband"><div class="gradebig" style="color:'+gradeColor(g)+'">'+g.toFixed(1)+'</div>'+
        '<div class="gradesub"><div class="row"><b>'+correct+'</b> / '+total+' correct ('+pct+'%)</div>'+
          '<div class="row">Course grading formula</div><div class="row">Pass line ‚âà <b>5.5</b></div></div></div>'+
      '<div class="secscores"><div class="miss-h" style="color:var(--gold)">By section</div>'+rows+'</div>'+
      '<div class="restart"><button class="btn" onclick="examReview(\''+id+'\')">Review answers ‚Üí</button>'+
        '<button class="btn ghost" onclick="examStart(\''+id+'\')">Retake</button></div>'+
    '</div>'+
    '<p class="credit">This paper has '+total+' questions; the real exam has 50 ‚Äî same formula, scaled.</p>';
}
function examReview(id){ const e=exams[id]; e.mode='review'; e.idx=0; examRender(id); }
