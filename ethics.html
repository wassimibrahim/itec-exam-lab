<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITEC ¬∑ Engineering for Society ‚Äî Exam Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d1622; --ink2:#0a121c; --panel:#15212f; --panel2:#1b2a3c; --panel3:#213347; --line:#27384c; --line2:#324863;
    --text:#e7eef5; --muted:#8da0b5; --faint:#5d7187;
    --gold:#e8b84b; --green:#3fb27f; --red:#e2566a; --trap:#b58cf2; --blue:#4ea0e0;
    --mooc1:#e8b84b; --mooc2:#e2566a; --mooc3:#3fb27f; --mooc4:#4ea0e0; --mooc5:#b58cf2; --mooc6:#e89a4b;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; font-family:'Inter',system-ui,sans-serif; color:var(--text);
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(78,160,224,.07), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(181,140,242,.06), transparent 55%),
      var(--ink);
    line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;margin:0}
  .mono{font-family:'IBM Plex Mono',monospace}
  a{color:var(--blue)}

  /* ===== top bar ===== */
  .topbar{position:sticky;top:0;z-index:50;background:rgba(10,18,28,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .topbar-inner{max-width:960px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;flex-shrink:0;cursor:pointer}
  .brand-mark{width:34px;height:34px;flex-shrink:0}
  .brand-txt .k{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .brand-txt .n{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;line-height:1.05;letter-spacing:-.01em}
  .countdown{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-align:right;line-height:1.3}
  .countdown b{color:var(--gold)}

  /* ===== tab nav ===== */
  .tabwrap{position:sticky;top:60px;z-index:40;background:rgba(13,22,34,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .tabs{max-width:960px;margin:0 auto;padding:0 14px;display:flex;gap:3px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.02em;color:var(--muted);
    background:transparent;border:none;border-bottom:2px solid transparent;padding:12px 13px 11px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--text);border-bottom-color:var(--gold)}
  .tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;opacity:.9}

  /* ===== page shell ===== */
  .page{max-width:740px;margin:0 auto;padding:30px 20px 70px;display:none}
  .page.on{display:block;animation:fade .35s ease}
  .page.wide{max-width:820px}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
  .h-title{font-size:30px;font-weight:700;letter-spacing:-.015em;line-height:1.08}
  .h-sub{color:var(--muted);font-size:14px;margin-top:9px;max-width:560px}

  /* ===== HOME ===== */
  .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:22px;margin-bottom:26px}
  .hero-ring{flex-shrink:0;text-align:center}
  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0}
  @media(max-width:560px){.home-grid{grid-template-columns:1fr}.hero{flex-direction:column-reverse;align-items:flex-start}}
  .mcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:17px 17px 15px;cursor:pointer;transition:border-color .15s,transform .12s,background .15s;text-align:left;position:relative;overflow:hidden}
  .mcard:hover{border-color:var(--line2);transform:translateY(-2px);background:var(--panel2)}
  .mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--gold))}
  .mcard .mc-k{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:var(--c,var(--gold));text-transform:uppercase}
  .mcard .mc-n{font-family:'Space Grotesk',sans-serif;font-size:16.5px;font-weight:600;margin:5px 0 3px;line-height:1.15}
  .mcard .mc-d{font-size:12.5px;color:var(--muted);line-height:1.4}
  .mcard .mc-meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--faint);margin-top:9px;display:flex;justify-content:space-between;align-items:center}
  .mcard .mc-best{color:var(--green)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:18px 19px;margin:14px 0}
  .panel h3{font-size:15px;margin-bottom:9px;display:flex;align-items:center;gap:8px}
  .panel p{font-size:13.5px;color:var(--muted);margin:7px 0}
  .panel ul{margin:8px 0 0;padding-left:19px}
  .panel li{font-size:13.5px;color:var(--muted);margin:5px 0}
  .panel li b{color:var(--text);font-weight:500}

  /* grade calc */
  .gcalc{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .gcalc input[type=range]{flex:1;min-width:160px;accent-color:var(--gold)}
  .gcalc .gnum{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text);min-width:64px}
  .gcalc .gout{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;line-height:1;min-width:74px;text-align:center}
  .glabel{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--faint);letter-spacing:.05em;margin-top:3px;text-align:center}

  /* ===== loop ring ===== */
  .ring{width:84px;height:84px;display:block}
  .ring-track{fill:none;stroke:var(--line);stroke-width:7}
  .ring-fill{fill:none;stroke:var(--gold);stroke-width:7;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .5s ease,stroke .3s ease}
  .ring-num{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;fill:var(--text)}
  .ring-lbl{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);margin-top:5px;letter-spacing:.04em}

  /* ===== drill: mode chips ===== */
  .modes{display:flex;flex-wrap:wrap;gap:7px;margin:18px 0 18px;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .chip{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.02em;background:var(--panel);color:var(--muted);border:1px solid var(--line);padding:6px 11px;border-radius:999px;cursor:pointer;transition:all .15s}
  .chip:hover{border-color:var(--gold);color:var(--text)}
  .chip.on{background:var(--gold);color:#1a1205;border-color:var(--gold);font-weight:500}
  .chip.trap.on{background:var(--trap);border-color:var(--trap);color:#160a26}
  .chip:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* ===== question card ===== */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 22px 20px;position:relative}
  .q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;gap:10px}
  .q-tag{color:var(--muted)}.q-tag b{color:var(--gold);font-weight:500}
  .trapflag{color:var(--trap);border:1px solid var(--trap);border-radius:6px;padding:2px 7px;font-size:10px;letter-spacing:.07em;white-space:nowrap}
  .q-text{font-size:17.5px;font-weight:500;line-height:1.42;margin-bottom:17px;font-family:'Space Grotesk',sans-serif}
  .q-text .calc{font-family:'IBM Plex Mono',monospace;font-size:15px;background:var(--panel2);padding:1px 6px;border-radius:5px;color:var(--gold)}
  .q-fig{margin:0 0 17px;padding:12px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow-x:auto}
  .q-fig img,.q-fig svg{display:block;margin:0 auto}
  .q-fig table{margin:0 auto}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:13px 15px;color:var(--text);font-size:14.5px;font-family:'Inter',sans-serif;cursor:pointer;transition:border-color .15s,background .15s}
  .opt:hover:not(:disabled){border-color:var(--gold)}
  .opt:disabled{cursor:default}
  .opt:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .opt-key{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:6px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .opt.correct{border-color:var(--green);background:rgba(63,178,127,.13)}
  .opt.correct .opt-key{border-color:var(--green);color:var(--green)}
  .opt.wrong{border-color:var(--red);background:rgba(226,86,106,.12)}
  .opt.wrong .opt-key{border-color:var(--red);color:var(--red)}
  .opt.sel{border-color:var(--gold);background:rgba(232,184,75,.14)}
  .opt.sel .opt-key{border-color:var(--gold);color:var(--gold)}
  .bib-fig{margin:16px 0;background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:12px;padding:16px 14px}
  .bib-fig svg{display:block;width:100%;height:auto}
  .bib-cap{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin-top:10px;letter-spacing:.02em;line-height:1.4}
  .submitbar{margin-top:14px;display:flex;justify-content:center}

  .fb{margin-top:16px;padding:14px 16px;border-radius:10px;font-size:13.5px;line-height:1.5;display:none;border-left:3px solid var(--line);background:var(--panel2)}
  .fb.show{display:block}
  .fb.good{border-left-color:var(--green)}
  .fb.bad{border-left-color:var(--red)}
  .fb-head{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
  .fb.good .fb-head{color:var(--green)}
  .fb.bad .fb-head{color:var(--red)}
  .fb em{color:var(--gold);font-style:normal;font-weight:500}
  .fb .wd{color:var(--faint);display:block;margin-top:7px;font-size:12.5px}

  .foot{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:18px;gap:10px 12px}
  .prog{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)}
  .btn{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;background:var(--gold);color:#1a1205;border:none;border-radius:9px;padding:10px 22px;cursor:pointer;transition:opacity .15s,transform .1s}
  .btn:hover{opacity:.9}.btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn:focus-visible{outline:2px solid var(--text);outline-offset:2px}
  .btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--text)}
  .btn.ghost:hover{border-color:var(--gold)}

  /* ===== end screen ===== */
  .end{text-align:center;padding:26px 16px}
  .end-pct{font-family:'Space Grotesk',sans-serif;font-size:60px;font-weight:700;line-height:1}
  .end-lbl{font-family:'IBM Plex Mono',monospace;color:var(--muted);letter-spacing:.05em;margin-top:8px}
  .end-msg{margin:18px auto 0;max-width:460px;color:var(--muted);font-size:14px;line-height:1.55}
  .end-msg b{color:var(--text)}
  .miss{text-align:left;max-width:520px;margin:22px auto 0}
  .miss-h{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--trap);margin-bottom:10px}
  .miss-item{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--trap);border-radius:8px;padding:11px 14px;margin-bottom:8px;font-size:13px;color:var(--muted)}
  .miss-item b{color:var(--gold);font-weight:500}
  .restart{margin-top:26px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  /* ===== exam grade band ===== */
  .gradeband{display:flex;align-items:center;justify-content:center;gap:26px;margin:14px auto 0;flex-wrap:wrap}
  .gradebig{font-family:'Space Grotesk',sans-serif;font-size:72px;font-weight:700;line-height:1}
  .gradesub{text-align:left}
  .gradesub .row{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--muted);margin:3px 0}
  .gradesub .row b{color:var(--text)}
  .secscores{max-width:520px;margin:24px auto 0;text-align:left}
  .secrow{display:flex;align-items:center;gap:12px;margin:9px 0;font-family:'IBM Plex Mono',monospace;font-size:12.5px}
  .secrow .nm{width:130px;flex-shrink:0;color:var(--muted)}
  .secrow .bar{flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden}
  .secrow .bar i{display:block;height:100%;border-radius:99px}
  .secrow .sc{width:42px;text-align:right;color:var(--text)}

  /* ===== BIBLE ===== */
  .bible-nav{display:flex;flex-wrap:wrap;gap:7px;margin:16px 0 24px;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .bible-sec{margin-bottom:30px;scroll-margin-top:120px}
  .bible h2{font-size:22px;margin:34px 0 4px;padding-top:8px;letter-spacing:-.01em}
  .bible h2 .num{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--c,var(--gold));margin-right:10px;font-weight:500}
  .bible .sec-rule{height:2px;background:linear-gradient(90deg,var(--c,var(--gold)),transparent);margin:4px 0 16px;border-radius:2px;opacity:.65}
  .bible h3{font-size:15.5px;margin:20px 0 7px;color:var(--text)}
  .bible h4{font-size:13px;margin:15px 0 5px;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;text-transform:uppercase;color:var(--gold)}
  .bible p{font-size:13.6px;color:#c4d2e0;margin:8px 0;line-height:1.6}
  .bible p b,.bible li b{color:var(--text);font-weight:600}
  .bible ul{margin:8px 0;padding-left:20px}
  .bible li{font-size:13.6px;color:#c4d2e0;margin:5px 0;line-height:1.55}
  .bible .lead{color:var(--muted);font-size:13.5px;font-style:italic;border-left:2px solid var(--line2);padding-left:13px;margin:10px 0}
  .bible code{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--panel2);padding:1px 5px;border-radius:4px;color:var(--gold)}
  .bible table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12.6px}
  .bible th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line2);background:var(--panel2)}
  .bible td{padding:8px 10px;border-bottom:1px solid var(--line);color:#c4d2e0;vertical-align:top}
  .bible td b{color:var(--text)}
  .bible tr:last-child td{border-bottom:none}
  .bible table.zebra tbody tr:nth-child(even){background:rgba(255,255,255,.012)}
  .trapbox{background:rgba(181,140,242,.08);border:1px solid rgba(181,140,242,.3);border-left:3px solid var(--trap);border-radius:9px;padding:13px 15px;margin:13px 0}
  .trapbox .th{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--trap);margin-bottom:6px}
  .trapbox p{margin:5px 0;font-size:13px}
  .keybox{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:13px 15px;margin:13px 0}
  .keybox .th{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
  .formula{font-family:'IBM Plex Mono',monospace;font-size:13.5px;background:var(--ink2);border:1px solid var(--line);border-radius:8px;padding:11px 14px;margin:10px 0;color:var(--text);overflow-x:auto}
  .formula .hl{color:var(--gold)}
  .toplink{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint);margin-top:14px;cursor:pointer}
  .toplink:hover{color:var(--gold)}

  /* print button */
  .printbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:8px 0 0}

  .credit{text-align:center;color:#4a6076;font-size:11.5px;font-family:'IBM Plex Mono',monospace;margin-top:34px;letter-spacing:.03em;line-height:1.6}

  @media(max-width:480px){
    .h-title{font-size:25px}
    .gradebig{font-size:56px}
    .bible h2{font-size:19px}
  }
  @media(prefers-reduced-motion:reduce){
    .ring-fill,.opt,.btn,.mcard,.page{transition:none;animation:none}
  }

  /* print stylesheet for the bible */
  @media print{
    .topbar,.tabwrap,.bible-nav,.printbar,.credit,.toplink{display:none!important}
    body{background:#fff;color:#111}
    .page{display:none!important}
    #print-root{display:block!important;max-width:100%;padding:0}
    .bible p,.bible li{color:#222}
    .bible td{color:#333}
    .bible h2{color:#000;page-break-after:avoid}
    .bible h3,.bible h4{page-break-after:avoid}
    .bible table,.trapbox,.keybox,.formula{page-break-inside:avoid}
    .trapbox{background:#f6f1ff;border-color:#c9b3f0}
    .keybox{background:#f5f5f5}
    .formula{background:#f5f5f5;color:#111}
  }
  #print-root{display:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand" onclick="go('home')">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="17" stroke="#e8b84b" stroke-width="2" opacity=".25"/>
        <path d="M20 6 a14 14 0 1 1 -9.9 4.1" stroke="#e8b84b" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M9 8 l1.5 2.6 l-3 .2 z" fill="#e8b84b"/>
        <circle cx="20" cy="20" r="4.2" fill="#3fb27f"/>
      </svg>
      <div class="brand-txt">
        <div class="k">ITEC ¬∑ Engineering for Society</div>
        <div class="n">Exam Lab</div>
      </div>
    </div>
    <div class="countdown" id="countdown"></div>
  </div>
</div>

<div class="tabwrap">
  <div class="tabs" id="tabs"></div>
</div>

<!-- HOME -->
<section class="page on" id="page-home"></section>

<!-- MOOC drill pages (filled by JS) -->
<section class="page" id="page-st"></section>
<section class="page" id="page-ra"></section>
<section class="page" id="page-lca"></section>
<section class="page" id="page-scba"></section>
<section class="page" id="page-dfv"></section>
<section class="page" id="page-ts"></section>

<!-- Bible -->
<section class="page wide bible" id="page-bible"></section>

<!-- Exams -->
<section class="page" id="page-ex1"></section>
<section class="page" id="page-ex2"></section>
<section class="page" id="page-ex3"></section>

<!-- print container -->
<div id="print-root"></div>

<script>
/* ============================================================
   ITEC Engineering for Society ‚Äî Exam Lab
   Single-file study app. Data + engine below.
   ============================================================ */
"use strict";

/* ===== MOOC metadata ===== */
const MOOCS = [
  {id:'st',  n:1, key:'st',   name:'Systems Thinking',           tag:'Loops, stocks, paradigms',          group:'m'},
  {id:'ra',  n:2, key:'ra',   name:'Risk Analysis',              tag:'FMEA, FTA, standards',              group:'t'},
  {id:'lca', n:3, key:'lca',  name:'Life Cycle Analysis',        tag:'MFA, boundaries, impact',           group:'t'},
  {id:'scba',n:4, key:'scba', name:'Social Cost-Benefit',        tag:'NPV, welfare, rule of half',        group:'t'},
  {id:'dfv', n:5, key:'dfv',  name:'Design for Values',          tag:'VSD, RI, mediation',                group:'t'},
  {id:'ts',  n:6, key:'ts',   name:'Tech Strategies',            tag:'IP / patents + standards',          group:'t'}
];

/* ============================================================
   QUESTION BANKS  ‚Äî  o[0] is always the correct answer, a:0.
   The engine shuffles option order at render time, so position
   on screen is randomised every time. trap:true = an item the
   real quizzes caught (or a classic confusion) for this learner.
   ============================================================ */
const BANKS = {};

/* ---------------- MOOC 1 ¬∑ SYSTEMS THINKING (reused, verified) ---------------- */
BANKS.st = [
    // ---------- Module 1 ----------
    {m:1, q:"How does NASA define \u201csystems engineering\u201d?",
     o:["A methodical, multi-disciplinary approach to the design, realization, technical management, operations, and retirement of a system",
        "A method focused solely on reducing the cost of system development",
        "An approach focusing on the individual components of a system in isolation",
        "The art of designing software that runs independently of hardware"],
     a:0, e:"Memorize the verbs: design, realization, technical management, operations, <em>retirement</em>. The whole lifecycle, multi-disciplinary."},

  sections:["Risk Analysis","Life Cycle Analysis","Systems Thinking","Social Cost-Benefit Analysis","Design for Values","Tech Strategies"],
  Q:[
  // ---- Risk Analysis : C D C D C B B B ----
  {sec:"Risk Analysis", q:"Given a fault tree, which of the following is NOT a minimal cut set?",
   o:["{A, B}","{G, H, I}","{H, I}","{F}"], c:2,
   e:"If {H,I} contains a smaller set that is already a cut set (e.g. {H} or {I} alone suffices, or {H,I} is a superset of another MCS), it isn't minimal. {F} as a singleton and the listed multi-event sets are minimal; {H,I} is the non-minimal one."},
  {sec:"Risk Analysis", q:"A rare disease emerges that has never been seen before and spreads unpredictably; scientists have no data on its infection rate. This is an example of:",
   o:["A hazard","A risk","A risk type","An uncertainty"], c:3,
   e:"No frequency data, no agreed probability, unique \u2192 uncertainty, not risk. Risks need repeatability/reliable data/expert agreement."},
  {sec:"Risk Analysis", q:"In a risk matrix, what two axes are typically used?",
   o:["Frequency and likelihood","Location and probability","Probability and severity","Risk and time"], c:2,
   e:"Probability/likelihood \u00d7 severity/harm. The ranks are ordinal labels \u2014 don't multiply them."},
  {sec:"Risk Analysis", q:"Who are risk beneficiaries according to the course?",
   o:["People responsible for managing the risk","People who analyze risks","People who are harmed by the risk","People who profit from the risk being taken"], c:3,
   e:"Beneficiaries profit. Owners manage/control; analysts assess; bearers are harmed/exposed."},
  {sec:"Risk Analysis", q:"Which method is typically used to identify failure modes in components?",
   o:["HAZOP","Fault-tree analysis","FMEA","FN curve plotting"], c:2,
   e:"FMEA reviews each component's failure modes. HAZOP works on nodes via guidewords; FTA is quantitative; FN curves are for group-risk assessment."},
  {sec:"Risk Analysis", q:"In risk analysis, harm is understood as:",
   o:["Injuries or damages directly related to personal safety incidents","Negative outcomes valued by stakeholders","Financial losses such as reduced revenue","Health consequences like illness, impairment, or death"], c:1,
   e:"Harm = any negative outcome stakeholders value (health, environmental, financial, ...). The others are just specific types of harm."},
  {sec:"Risk Analysis", q:"In an FMEA, 'Occurrence' typically refers to:",
   o:["The harm severity","The probability of a failure mode","The chance of detection","The success of a safety system"], c:1,
   e:"OCC = probability. SEV = harm. DET = how well controls detect it. Multiplying them (RPN) is strictly nonsensical."},
  {sec:"Risk Analysis", q:"In an FN curve, the plotted frequency F is:",
   o:["The annual frequency of exactly N casualties","The cumulative frequency of events with at least N casualties","The conditional frequency given an accident occurred","The reciprocal of expected casualties per year"], c:1,
   e:"Cumulative (\u2265 N) \u2192 the curve is monotonically decreasing. Build by ordering by decreasing N and summing frequencies."},
  // ---- Life Cycle Analysis : D A B C D A C D ----
  {sec:"Life Cycle Analysis", q:"A company does a quick scan of a product's impact using average data to identify major hotspots. What type of LCA is this?",
   o:["Attributional LCA","Consequential LCA","Full LCA","Screening LCA"], c:3,
   e:"Screening = quick, average data, find hotspots first."},
  {sec:"Life Cycle Analysis", q:"Why is defining a functional unit important in LCA?",
   o:["It allows valid comparison between alternatives","It describes the product's weight","It ensures energy efficiency","It limits the study's cost"], c:0,
   e:"The functional unit is the quantified service; without it you can't compare alternatives fairly."},
  {sec:"Life Cycle Analysis", q:"What do the boxes and arrows represent in an MFA flow chart?",
   o:["Energy and waste","Processes and flows","Resources and emissions","Stocks and time"], c:1,
   e:"Boxes = processes, arrows = flows. A Sankey diagram adds width \u221d magnitude."},
  {sec:"Life Cycle Analysis", q:"What part of the product's life cycle does 'cradle-to-grave' analysis consist of?",
   o:["End-of-life replaced by upgrade, reuse, or recycling","From mining primary materials to manufacturing the product","From raw-material extraction to disposal","Transport and marketing"], c:2,
   e:"Cradle-to-grave = extraction \u2192 disposal. The 'upgrade/reuse/recycle' option is cradle-to-cradle; 'to manufacturing' is cradle-to-gate."},
  {sec:"Life Cycle Analysis", q:"Which of the following is an example of a dissipative flow?",
   o:["Aluminum in a soda can","Steel beam in a building","Water stored in tanks","Fertilizer sprayed on crops"], c:3,
   e:"Dissipative = spread out and unrecoverable. The metals/water here are concentrated/recoverable."},
  {sec:"Life Cycle Analysis", q:"Which diagram type emphasizes quantities of flows with arrow widths?",
   o:["Sankey diagram","Flow chart","Causal loop diagram","Gantt chart"], c:0,
   e:"Sankey: width \u221d flow magnitude."},
  {sec:"Life Cycle Analysis", q:"Which tool tracks the quality of data in LCA studies?",
   o:["Balance equation","SWOT analysis","Pedigree matrix","Scenario matrix"], c:2,
   e:"Pedigree matrix scores reliability/completeness/temporal/geographical/technological correlation."},
  {sec:"Life Cycle Analysis", q:"Which definition is most commonly associated with sustainable development?",
   o:["Kyoto Protocol","Paris Agreement","Rio Declaration","Brundtland Report"], c:3,
   e:"Brundtland (1987): meet present needs without compromising future generations."},
  // ---- Systems Thinking : C B D C C C A B ----
  {sec:"Systems Thinking", q:"What is the main difference between analysis and synthesis?",
   o:["Analysis does not lead to conclusions, synthesis does","Analysis focuses on people, synthesis on machines","Analysis isolates parts; synthesis considers the whole system and interactions","Analysis is used in design; synthesis in testing"], c:2,
   e:"Analysis \u2192 parts (reductionism); synthesis \u2192 whole + relationships (holism). Don't flip them."},
  {sec:"Systems Thinking", q:"Which is a good indicator for assessing depletion in a stock-flow system?",
   o:["Emission-absorption ratio","Harvest-regeneration ratio","Turnover time","Turnover-time ratio"], c:1,
   e:"Harvest/regeneration > 1 \u2192 depletion of a renewable. Emission/absorption is for pollution sinks; turnover time = replacement time."},
  {sec:"Systems Thinking", q:"What is a key characteristic of a negative (balancing) feedback loop?",
   o:["It increases instability","It is often faster than positive feedback","It leads to exponential growth","It keeps things the same"], c:3,
   e:"Balancing = opposes change, stabilises (homeostasis). Reinforcing = amplifies/exponential."},
  {sec:"Systems Thinking", q:"What does the '70 rule' in exponential growth imply?",
   o:["70% of systems double every decade","After 70 months all growth stops","Divide 70 by the annual growth rate to estimate doubling time","Growth can only be linear up to 70%"], c:2,
   e:"Doubling time \u2248 70 / growth%. 10% \u2192 ~7 yr; 2% \u2192 ~35 yr."},
  {sec:"Systems Thinking", q:"Which best describes a stock in systems thinking?",
   o:["A rule that changes a system's behavior","A flow of materials or energy","An accumulation of a quantity that can rise or fall over time","An input/output over time that increases or decreases flows"], c:2,
   e:"Stock = accumulation (changes only via flows). The last option describes a flow."},
  {sec:"Systems Thinking", q:"In systems thinking, feedback delays can lead to:",
   o:["Making systems easier to control","Uncovering the deeper structures of the real system","Obscuring the link between cause and effect","Eliminating reinforcing loops"], c:2,
   e:"Long delays hide cause\u2013effect (sun exposure now, skin damage decades later), making systems hard to manage."},
  {sec:"Systems Thinking", q:"Which assumption belongs to the classical (realist) paradigm, NOT systems thinking?",
   o:["Equivalence between cause and effect","Phase transitions in processes","Self-interaction within systems","Constructivist view of knowledge"], c:0,
   e:"Classical: equivalence, continuity, mechanism, elementarism, realism. Systems view replaces these with bifurcations, phases, self-interaction, constructivism."},
  {sec:"Systems Thinking", q:"In system paradigms, analysis is linked to:",
   o:["Holism and synthesis","Reductionism and breaking systems into parts","Non-linear causation","Understanding entities through their relations within a whole"], c:1,
   e:"Analysis = reductionism + linear causation + parts-first. The others describe synthesis."},
  // ---- Social Cost-Benefit Analysis : B C B C A A A A ----
  {sec:"Social Cost-Benefit Analysis", q:"Sensitivity analysis in SCBA is used to:",
   o:["Eliminate uncertainty","Test how results change under different assumptions","Guarantee positive NPVs","Increase project benefits artificially"], c:1,
   e:"It probes robustness, not certainty. Methods: partial/tornado, best-worst, Monte Carlo."},
  {sec:"Social Cost-Benefit Analysis", q:"Which is a caveat about using Kaldor\u2013Hicks in SCBA?",
   o:["Compensation is automatic in public projects","Removing the need to study distributional effects","Compensation is rarely implemented","The forbidding of non-market effects"], c:2,
   e:"'Could compensate' \u2260 'does compensate' \u2014 losers often go uncompensated, so equity analysis still matters."},
  {sec:"Social Cost-Benefit Analysis", q:"In Excel, how is Year 0 treated in NPV()?",
   o:["Include it inside the NPV() range","Add/subtract it separately","Ignore it; it is implicitly discounted","Multiply it by (1+r) before entry"], c:1,
   e:"Excel's NPV() discounts the first value by one period, so the true Year-0 amount goes outside the function."},
  {sec:"Social Cost-Benefit Analysis", q:"A limitation of the IRR in SCBA is that it...",
   o:["Often equals the NPV numerically","Does not consider the initial costs of a project","Does not account for the scale of a project","Cannot indicate the max cost of capital while breaking even"], c:2,
   e:"IRR is a rate \u2192 blind to project scale. (It actually does indicate breakeven cost of capital; it does consider initial costs.)"},
  {sec:"Social Cost-Benefit Analysis", q:"What is the main limitation of NPV?",
   o:["It is sensitive to the discount rate","It is a percentage-based metric","It ignores the time value of money","It cannot be calculated in Excel"], c:0,
   e:"NPV depends strongly on r \u2192 do sensitivity analysis on r. It's an absolute figure and DOES account for time value."},
  {sec:"Social Cost-Benefit Analysis", q:"A bus fare drops from \u20ac3.00 to \u20ac2.50 and ridership rises from 8,000 to 10,000. What is the total gain?",
   o:["\u20ac4,500","\u20ac5,000","\u20ac8,000","\u20ac9,000"], c:0,
   e:"Rule of half: 0.50\u00d78000 + \u00bd\u00d70.50\u00d72000 = 4000 + 500 = \u20ac4,500."},
  {sec:"Social Cost-Benefit Analysis", q:"Ride-sharing's effect on public-transport usage is:",
   o:["An indirect effect: it reduces demand for public transport","A direct effect: it increases public-transport profitability","An external effect: it decreases road congestion","A non-price-mediated effect: no impact"], c:0,
   e:"It works through a related market \u2192 indirect effect. Direct = the project's own market; external = unpriced spillovers."},
  {sec:"Social Cost-Benefit Analysis", q:"Which is an example of an external cost in SCBA?",
   o:["Air pollution from increased traffic","Higher construction expenses","Wages of construction workers","Maintenance contracts for operators"], c:0,
   e:"External = unpriced, on third parties. The rest are direct market costs."},
  // ---- Design for Values : D A B B A D A B ----
  {sec:"Design for Values", q:"A vacuum cleaner meant to cut housework didn't reduce domestic work. Spending more time on household tasks is:",
   o:["An embedded value","An intended value","An intrinsic value","A realized value"], c:3,
   e:"Realized = what actually happens in practice (vs intended = designer's aim, embedded = built in)."},
  {sec:"Design for Values", q:"In VSD, which investigation aims at making trade-offs between values?",
   o:["Conceptual investigation","Empirical investigation","Normative investigation","Technical investigation"], c:0,
   e:"Conceptual = clarify values and their trade-offs. Empirical = stakeholders/context; technical = designs."},
  {sec:"Design for Values", q:"Which is NOT typically a direct stakeholder in a design project?",
   o:["The engineers building the system","The future generations impacted by the technology","The regulators who set safety standards","The users applying the technology"], c:1,
   e:"Future generations = indirect (affected without interacting). Users, operators, regulators = direct."},
  {sec:"Design for Values", q:"Which three layers does the value hierarchy consist of?",
   o:["Values, norms, articles","Values, norms, design requirements","Values, design requirements, articles","Values, codes of conduct, norms"], c:1,
   e:"Values \u2192 norms \u2192 design requirements (top-down or bottom-up)."},
  {sec:"Design for Values", q:"Why is value incommensurability a challenge for cost-benefit analysis?",
   o:["Not all values can be compared on a common scale","It complicates contingent validation","Monetary units cannot be used in social contexts","CBA avoids direct trade-offs between values"], c:0,
   e:"CBA needs one yardstick; incommensurable values resist a shared (monetary) scale."},
  {sec:"Design for Values", q:"What does technological mediation mean in design?",
   o:["Technologies remain neutral intermediaries","Technologies influence only economic outcomes","Technologies ensure realized values match intended values","Technologies shape how people perceive the world and act in it"], c:3,
   e:"Artefacts co-shape perception and action \u2014 they are not neutral."},
  {sec:"Design for Values", q:"A principled argument for responsible innovation emphasizes:",
   o:["Democratic control","Profit growth","Efficiency gains","Competitive advantage"], c:0,
   e:"Principled/normative = democratic control. Instrumental = better technology/outcomes."},
  {sec:"Design for Values", q:"Responsiveness in innovation means:",
   o:["Anticipating the possible consequences of innovations","Adapting to societal needs and new insights","Involving all relevant stakeholders","Reflecting on stakeholders' values, goals, and needs"], c:1,
   e:"Responsiveness = adapt/act. The others are anticipation, inclusiveness, and reflexivity."},
  // ---- Tech Strategies : D C B A A C A D ----
  {sec:"Tech Strategies", q:"Which of the following is NOT a condition of patentability?",
   o:["Disclosure","Industrial applicability","Novelty","Published articles"], c:3,
   e:"The five conditions: novelty, inventive step, industrial applicability, patentable subject matter, disclosure. 'Published articles' is not one."},
  {sec:"Tech Strategies", q:"Copyright protection covers:",
   o:["Ideas","Industrial processes","Motion pictures","Product names"], c:2,
   e:"Copyright covers original EXPRESSION (motion pictures, text, music). Ideas are free; processes \u2192 patents; names \u2192 trademarks."},
  {sec:"Tech Strategies", q:"A 'patent troll' is typically defined as:",
   o:["An entity claiming an idea of another entity","An entity enforcing patents without using the invention","An entity falsely pretending to have a patent","An entity trying to declare others' patents invalid"], c:1,
   e:"Troll = enforces patents it doesn't practise, often waiting for implementer lock-in. Not all NPEs are trolls."},
  {sec:"Tech Strategies", q:"Which 'kind code' indicates a published European patent APPLICATION?",
   o:["A","E","I","B"], c:0,
   e:"A = application; B = granted patent."},
  {sec:"Tech Strategies", q:"What is a de-facto standard?",
   o:["A market-adopted practice not formalized through standardization","A regional regulation for product development","A standard agreed but without consensus in SSOs","A standard that must still be adopted by law"], c:0,
   e:"De-facto = the market converged on it without a formal process (e.g. QWERTY). De-jure = made obligatory by law."},
  {sec:"Tech Strategies", q:"What specific risks threaten trade-secret protection?",
   o:["Patent trolls and prior-art searches","Supply-chain delays and standards battles","Independent discovery and reverse engineering","Copyright strikes and brand dilution"], c:2,
   e:"Trade secrets can be lawfully lost via independent discovery or reverse engineering \u2014 no statute stops that."},
  {sec:"Tech Strategies", q:"Is it possible to obtain patents not intended to be used?",
   o:["Yes, for defensive purposes or to block technological routes","No, a patent must be used within two years or be revoked","Only if you license it out within five years","Only when evergreening is not an option"], c:0,
   e:"Defensive patenting and route-blocking are legitimate strategies \u2014 there's no 'use it or lose it' rule for patents."},
  {sec:"Tech Strategies", q:"Which is NOT one of the six basic IP strategies discussed?",
   o:["Preserving exclusivity","Cross-licensing","Creating intangible assets","Patent pooling"], c:3,
   e:"The six: preserve exclusivity, license out, cross-license, defensive patenting, create intangible assets, block routes. Patent pooling is a separate special strategy."}
  ]
};

/* ---- EX2 = a fresh 48-question mock in the same style/difficulty ---- */
EXAMS.ex2 = {
  title:"Mock Exam B",
  blurb:"A second 48-question paper built in the professor's style \u2014 same topics and difficulty as the real exam, all-new questions. Immediate feedback, official grading.",
  sections:["Risk Analysis","Life Cycle Analysis","Systems Thinking","Social Cost-Benefit Analysis","Design for Values","Tech Strategies"],
  Q:[
  // ---- Risk Analysis ----
  {sec:"Risk Analysis", q:"A risk analyst uses a well-known facility as a benchmark and studies only what is different about a new design. This is a workaround for:",
   o:["The frequentist problem of having no data on a unique system","The ordinal nature of risk-matrix ranks","The need to draw an FN curve","The ALARP principle"], c:0,
   e:"Comparing to a similar known system estimates whether risk is greater/smaller \u2014 but it creates a reference-class problem."},
  {sec:"Risk Analysis", q:"Individual risk IR\u2093 is best described as a property of:",
   o:["A named individual's lifestyle","A location, regardless of who is there","An entire exposed population","A company's safety culture"], c:1,
   e:"IR\u2093 = probability of death of an average unprotected person CONSTANTLY at location x. It attaches to places, not persons."},
  {sec:"Risk Analysis", q:"Type-2 controls in an FMEA are those that:",
   o:["Prevent the failure mode from occurring","Monitor the causes so preventive action can be taken","Detect the failure once it has occurred","Assign blame after an accident"], c:1,
   e:"Type-1 prevent, type-2 monitor causes, type-3 detect occurrences."},
  {sec:"Risk Analysis", q:"Replacing a human operator with an automated component is often effective because:",
   o:["Machines never fail","Human error rates are orders of magnitude higher than hardware","It always costs less","Humans cannot be trained"], c:1,
   e:"Human failure rates dwarf mechanical/electronic ones and rise under stress/boredom \u2014 but removing human control invites resistance."},
  {sec:"Risk Analysis", q:"In a fault tree, two independent layers of protection are connected by:",
   o:["An OR gate, so either failing causes the top event","An AND gate, so both must fail for the top event","No gate, since layers are unrelated","A delay marker"], c:1,
   e:"Independent layers \u2192 AND gate \u2192 the top event needs all to fail. Each extra layer cuts P(top) by ~its own failure probability."},
  {sec:"Risk Analysis", q:"Which is a sign you should use a QUALITATIVE risk standard (risk matrix) rather than a quantitative one?",
   o:["There is a clear lack of data or benchmark system","You already have precise failure-rate data","Regulations demand a numerical demonstration","The risk is obviously within the ALARP zone"], c:0,
   e:"Matrices suit screening and low-data situations, or spotting clearly-unacceptable sources fast."},
  {sec:"Risk Analysis", q:"A common-cause failure is dangerous mainly because it:",
   o:["Appears in many branches of a fault tree, defeating the independence of layers/redundancies","Only ever affects one component","Reduces the top-event probability","Is always a singleton minimal cut set by coincidence"], c:0,
   e:"A shared power supply or single operator breaks the independence assumption \u2192 several 'independent' protections fail together."},
  {sec:"Risk Analysis", q:"When reporting a result that sits just inside the ALARP zone, you should:",
   o:["Give a single precise number to look authoritative","Always report it with an error margin and discuss your assumptions","Round it down to reach acceptability","Omit it to avoid alarm"], c:1,
   e:"Near-standard / ALARP results without margins are misleading and possibly illegal."},
  // ---- Life Cycle Analysis ----
  {sec:"Life Cycle Analysis", q:"In an impact assessment, converting methane and CO\u2082 into a single CO\u2082-equivalent figure is the step called:",
   o:["Classification","Characterization","Normalization","Weighting"], c:1,
   e:"Characterization applies equivalence factors within a category. Order: classify \u2192 characterize \u2192 normalize \u2192 weight."},
  {sec:"Life Cycle Analysis", q:"A 'gate-to-gate' boundary covers:",
   o:["Raw extraction to disposal","A single process step within the life cycle","Extraction to the factory gate","Disposal only"], c:1,
   e:"Gate-to-gate = one step. Cradle-to-gate = extraction\u2192gate; cradle-to-grave = extraction\u2192disposal."},
  {sec:"Life Cycle Analysis", q:"The mass-balance equation for an MFA process states that:",
   o:["Input equals output plus accumulation","Output always exceeds input","Mass is created in dissipative flows","Flows equal stocks at all times"], c:0,
   e:"Conservation of mass over the boundary: in = out + accumulation."},
  {sec:"Life Cycle Analysis", q:"'Scorpion' flows in the volume/impact metaphor are:",
   o:["Large-volume, low-impact flows","Low-volume but high-impact flows","Purely informational flows","Flows that always accumulate"], c:1,
   e:"Scorpions = small mass, big sting (toxics). Elephants = big mass, modest impact. Cut-off rules can wrongly drop scorpions."},
  {sec:"Life Cycle Analysis", q:"Allocation in LCA becomes necessary when:",
   o:["A process produces several co-products sharing the same impacts","All flows exceed the cut-off","The discount rate changes","Data quality is perfect"], c:0,
   e:"Allocation divides shared impacts among co-products (by mass, energy, or economic value)."},
  {sec:"Life Cycle Analysis", q:"Consequential LCA is most appropriate when you want to know:",
   o:["The impacts attributable to a product as it currently is","How impacts CHANGE as a result of a decision","Only the product's mass","The colour of the packaging"], c:1,
   e:"Consequential models the system change a decision causes; attributional describes the status quo share."},
  {sec:"Life Cycle Analysis", q:"The pedigree matrix scores a dataset on reliability, completeness, and its correlation in:",
   o:["Price, brand, and marketing","Time, geography, and technology","Mass, volume, and density","Cost, risk, and benefit"], c:1,
   e:"Temporal, geographical and technological correlation, plus reliability and completeness \u2014 five data-quality dimensions."},
  {sec:"Life Cycle Analysis", q:"Why should you be cautious about concluding from incomplete LCA data?",
   o:["Roughly 80% of impact can come from 20% of flows, so missing data can hide major impacts","Incomplete data is always wrong","Completeness is impossible anyway","Data quality never matters"], c:0,
   e:"The 80/20 caution: don't over-claim; missing 'scorpion' flows can dominate the result."},
  // ---- Systems Thinking ----
  {sec:"Systems Thinking", q:"According to Meadows, the true purpose of a system is best deduced from:",
   o:["Its stated mission","Its behavior over time","Its organizational chart","The intentions of its founders"], c:1,
   e:"Purposes are deduced from behavior, not rhetoric \u2014 the frog catches flies; a government that funds nothing isn't protecting the environment."},
  {sec:"Systems Thinking", q:"Changing which part of a system usually has the LEAST effect on its behavior?",
   o:["The elements","The interconnections","The purpose","The feedback structure"], c:0,
   e:"Swap all players \u2192 still a football team. Change the rules (interconnections) or the goal (purpose) and the system changes."},
  {sec:"Systems Thinking", q:"In the classical \u2192 systems mapping, the 'continuity' assumption is replaced by:",
   o:["Bifurcations","Phases / phase transitions","Self-interaction","Constructivism"], c:1,
   e:"Continuity (smooth change) \u2192 phases (erratic jumps, new order \u2014 water\u2192ice\u2192gas). Equivalence\u2192bifurcations; realism\u2192constructivism."},
  {sec:"Systems Thinking", q:"A reinforcing feedback loop can produce:",
   o:["Only growth","Only decline","Either runaway growth OR collapse, depending on direction","Stable oscillation around a setpoint"], c:2,
   e:"Reinforcing amplifies in whichever direction it starts \u2014 exponential growth or a death spiral (too few mates \u2192 extinction)."},
  {sec:"Systems Thinking", q:"If time were frozen in a system, which would remain?",
   o:["Flows","Stocks","Both equally","Neither"], c:1,
   e:"Stocks are accumulations that persist; flows are per-time movements that vanish if time stops."},
  {sec:"Systems Thinking", q:"A CLD link with NEGATIVE polarity means:",
   o:["Cause up \u2192 effect up","Cause up \u2192 effect down","The variables are unrelated","The link is delayed"], c:1,
   e:"Negative = opposite direction. Positive = same direction. A loop with one negative link tends to be balancing."},
  {sec:"Systems Thinking", q:"The events\u2013patterns\u2013structure iceberg implies that lasting change comes from acting on:",
   o:["Events (the visible tip)","Patterns (trends)","Structure (the hidden relationships)","Rhetoric about goals"], c:2,
   e:"Events are symptoms, patterns are trends, structure is the root cause that generates them."},
  {sec:"Systems Thinking", q:"The constructivist epistemology in systems thinking holds that a scientific law is:",
   o:["An exact mirror of reality","A human-made model that works well enough, not reality itself","Always false","Independent of any observer"], c:1,
   e:"Constructivism: Ohm's law is a useful approximation/model, not 'the world as it is'. The opposing view is realism."},
  // ---- Social Cost-Benefit Analysis ----
  {sec:"Social Cost-Benefit Analysis", q:"The Pareto criterion is often too strict for real projects because:",
   o:["It requires that literally no one is made worse off","It ignores the time value of money","It forbids monetary valuation","It always produces multiple answers"], c:0,
   e:"Real projects create losers, so strict Pareto rarely applies \u2014 hence Kaldor-Hicks (potential compensation)."},
  {sec:"Social Cost-Benefit Analysis", q:"Existence value (valuing a species existing even if you never see it) is a type of:",
   o:["Direct use value","Indirect use value","Option value","Non-use value"], c:3,
   e:"TEV = use (direct/indirect/option) + non-use (existence/bequest)."},
  {sec:"Social Cost-Benefit Analysis", q:"A lower discount rate r tends to:",
   o:["Reduce the present value of future benefits","Raise the present value of future benefits, favouring long-term projects","Have no effect on NPV","Only change Year 0"], c:1,
   e:"Future benefits are divided by (1+r)^t; smaller r \u2192 larger PV \u2192 long-term projects look better."},
  {sec:"Social Cost-Benefit Analysis", q:"Distributional weights w = (y/y_i)^\u03b7 give MORE weight to:",
   o:["Higher-income groups","Lower-income groups (because a euro means more to them)","All groups equally","Whoever pays the most tax"], c:1,
   e:"Diminishing marginal utility of income \u2192 weight > 1 for low-income groups; \u03b7 sets inequality aversion."},
  {sec:"Social Cost-Benefit Analysis", q:"In a decision tree, a circle (chance node) is evaluated by:",
   o:["Picking the highest-value branch","Taking the probability-weighted expected value of its branches","Ignoring probabilities","Choosing the cheapest branch"], c:1,
   e:"Chance node \u2192 \u03a3 p\u00b7value. A square (decision node) \u2192 you pick the best branch."},
  {sec:"Social Cost-Benefit Analysis", q:"A Monte Carlo sensitivity analysis is distinctive because it:",
   o:["Changes one variable at a time","Samples probability distributions for many variables at once","Reports one deterministic NPV","Eliminates uncertainty entirely"], c:1,
   e:"Monte Carlo \u2192 a distribution of outcomes. Partial/tornado analysis changes one input at a time."},
  {sec:"Social Cost-Benefit Analysis", q:"The Benefit-Cost Ratio shares which weakness with the IRR?",
   o:["Both ignore the time value of money","Both are blind to the absolute scale of a project","Both cannot be computed in Excel","Both require a negative NPV"], c:1,
   e:"BCR and IRR are ratios/rates \u2192 they hide scale. Pair them with NPV (an absolute figure)."},
  {sec:"Social Cost-Benefit Analysis", q:"A new metro line lowering rents in nearby neighbourhoods is best classified as:",
   o:["A direct effect","An indirect effect in a related market","An external (unpriced) effect","A non-effect"], c:1,
   e:"Housing is a related market reached via prices \u2192 indirect effect. External effects are unpriced (e.g. noise)."},
  // ---- Design for Values ----
  {sec:"Design for Values", q:"The empirical investigation in VSD primarily studies:",
   o:["How stakeholders experience the technology in context","The precise definitions of each value","The technical mechanisms inside the device","The wording of legal statutes"], c:0,
   e:"Empirical = stakeholders/context. Conceptual = define values/trade-offs; technical = how designs support values."},
  {sec:"Design for Values", q:"Designing a seatbelt alarm that beeps until you buckle up is an example of:",
   o:["Value incommensurability","Moralizing technology (nudging/forcing behavior)","A purely aesthetic choice","Cost-benefit analysis"], c:1,
   e:"Moralizing technology steers behavior via forcing/nudging/feedback \u2014 a form of technological mediation."},
  {sec:"Design for Values", q:"The Collingridge dilemma says that early in a technology's life:",
   o:["It is easy to change but its impacts are hard to know","It is easy to both predict and control","It cannot be regulated at any stage","Only profit considerations apply"], c:0,
   e:"Early: malleable but unknown impacts; later: known impacts but entrenched. Anticipation tools (scenarios) help."},
  {sec:"Design for Values", q:"Reflexivity, one of the four RI criteria, means:",
   o:["Forecasting consequences","Examining one's own assumptions and values (first/second-order learning)","Involving stakeholders","Adapting to new insights"], c:1,
   e:"Reflexivity scrutinises the innovators' own framings. The others are anticipation, inclusiveness, responsiveness."},
  {sec:"Design for Values", q:"Responsible Innovation differs from Corporate Social Responsibility mainly because RI:",
   o:["Acts upstream, in the R&D phase, shaping the technology itself","Applies only after launch","Is just charitable giving","Ignores societal values"], c:0,
   e:"RI = early/upstream in research and design; CSR = later phases around an existing product."},
  {sec:"Design for Values", q:"Which is a method for resolving value conflicts in design?",
   o:["Ignoring the least profitable value","Setting thresholds (minimum acceptable levels)","Letting marketing decide","Removing all stakeholders"], c:1,
   e:"Five methods: cost-benefit analysis, multi-criteria analysis, thresholds, reasoning/weighing, and innovation."},
  {sec:"Design for Values", q:"An 'intended value' in the intended/embedded/realized scheme is:",
   o:["What the designer aims to achieve before the artefact exists","What is physically built into the artefact","What actually results in practice","The resale price"], c:0,
   e:"Intended \u2192 embedded \u2192 realized. They frequently diverge, which is why evaluation matters."},
  {sec:"Design for Values", q:"For embedding a contested technology in society, the course favours:",
   o:["A negotiation strategy with stakeholders","Top-down imposition","A purely technical fix","A marketing-only campaign"], c:0,
   e:"Negotiation/iteration beats presenting a finished 'solution', which tends to trigger resistance (cf. Barendrecht)."},
  // ---- Tech Strategies ----
  {sec:"Tech Strategies", q:"Which IP right arises AUTOMATICALLY, without any registration or examination?",
   o:["Patent","Copyright","Design right","Trademark"], c:1,
   e:"Copyright exists on creation. Patents/trademarks need application; design rights need registration."},
  {sec:"Tech Strategies", q:"A patent pool is legally restricted under competition law to bundling only:",
   o:["Substitute (competing) patents","Complementary patents","Expired patents","Trademarks"], c:1,
   e:"Only complementary patents may be pooled; pooling substitutes would suppress competition."},
  {sec:"Tech Strategies", q:"A 'privateer' in IP strategy is:",
   o:["A standards body","A third party that asserts transferred patents against a firm's competitors","An inventor who never patents","A type of harmonised standard"], c:1,
   e:"A firm hands patents to a third party to attack rivals while keeping its own reputation clean."},
  {sec:"Tech Strategies", q:"Employee inventors are legally entitled to compensation for their inventions:",
   o:["Everywhere in the world","Only in some countries, such as Germany","Never","Only at universities"], c:1,
   e:"Mandatory employee-inventor compensation exists only in some jurisdictions (Germany being the classic case)."},
  {sec:"Tech Strategies", q:"The advantage of the 'concept approach' to patent searching is that it:",
   o:["Returns absolutely everything related","Narrows results to the intersection of concept groups","Searches in every language","Is faster than any other method by design"], c:1,
   e:"(a OR b) AND (c OR d) \u2192 the overlap of concept sets, focusing the results."},
  {sec:"Tech Strategies", q:"Which open-standard principle is breached if a single interest group funds and steers a standard?",
   o:["Transparency","Openness","Impartiality and consensus","Development dimension"], c:2,
   e:"Capture by one interest breaks impartiality & consensus \u2014 one of the six WTO/TBT open-standard principles."},
  {sec:"Tech Strategies", q:"Meeting a HARMONISED European standard gives a producer:",
   o:["A quality mark allowing a price premium","An assumption of conformity with the relevant EU directive","A patent on the product","Exemption from all testing"], c:1,
   e:"Presumption of conformity \u2192 then CE mark / Declaration of Conformity. You may prove conformity otherwise, but then the burden is on you."},
  {sec:"Tech Strategies", q:"If membership of a standard-setting organisation is INDIRECT, it means:",
   o:["Individuals vote directly","Members are represented through national standards bodies","There is no voting at all","Only one company controls it"], c:1,
   e:"Indirect (formal SSOs like ISO) = participation via national bodies. Direct membership = organisations join themselves (quasi-formal/consortia)."}
  ]
};

EXAMS.ex3 = {
  title:"Real Final Exam ‚Äî Q3 2026",
  blurb:"Your actual 0LVX20 final (#23432036): all 48 questions transcribed with the verified-correct answers from the graded paper and a worked explanation for every one. Figures included. The closest possible practice to the real thing.",
  sections:["Design for Values","Systems Thinking","Social Cost-Benefit Analysis","Life Cycle Analysis","Tech Strategies","Risk Analysis"],
  Q:[
  /* ---- ¬ß1 Design for Values ---- */
  {sec:"Design for Values", q:"How do nudges influence user behavior?",
   o:["By banning certain options or possibilities for behavior","By forcing users to act in a certain way","By presenting choices in a way that affects decision-making","By empowering people to improve their competences to make better choices"], c:2,
   e:"A nudge steers choice through how options are presented (choice architecture) while keeping all options open. Banning is a mandate, forcing is a push, and boosting competence is a ‚Äúboost‚Äù ‚Äî none of those is a nudge."},
  {sec:"Design for Values", q:"It is part of designers' responsibility to anticipate the circumstances and ways in which artifacts will be used, and how this will affect the ‚Ä¶. of values. Which word fills the blank?",
   o:["realization","intention","embeddedness","neutrality"], c:0,
   e:"Designers shape the <em>realization</em> of values ‚Äî whether intended values actually come about in real use. Intention is the aim; realization is the outcome, and the two can diverge."},
  {sec:"Design for Values", q:"Which of the following best describes intended value in a design?",
   o:["The value that designers aim to realize","The value users perceive when using the product","The value actually achieved in practice","The value realized when a product is used according to its use plan"], c:0,
   e:"<em>Intended</em> value = what designers aim for. The other options describe perceived or <em>realized</em> value ‚Äî what actually happens in practice."},
  {sec:"Design for Values", q:"A principled argument for responsible innovation emphasizes:",
   o:["Efficiency gains","Competitive advantage","Democratic control","Profit growth"], c:2,
   e:"Responsible innovation is justified on principled (not merely consequentialist) grounds: innovation should be under <em>democratic control</em>, not driven only by efficiency or profit."},
  {sec:"Design for Values", q:"What is the role of technical codes in design?",
   o:["They explicitly define the values that should be included in a technological design.","They provide recommendations for compatibility in design.","They provide guidelines for engineers to implement values, such as safety and sustainability.","They enforce legal requirements to protect, e.g., safety and health."], c:3,
   e:"Technical codes are legally binding minimums that <em>enforce</em> protections like safety and health. They don't define which values to pursue, nor merely ‚Äúrecommend‚Äù ‚Äî that's the trap (a/c)."},
  {sec:"Design for Values", q:"Which of the following methods assumes all values can be expressed in one common unit?",
   o:["Multiple criteria analysis","Financial analysis","Budget impact analysis","Cost-benefit analysis"], c:3,
   e:"Cost-benefit analysis monetises everything into one unit (money). Multiple-criteria analysis is the opposite ‚Äî it deliberately keeps incommensurable values separate."},
  {sec:"Design for Values", q:"What is NOT a reason for creating 'personas' in a stakeholder analysis?",
   o:["To understand perspectives and interests of people with, e.g., dementia.","To represent the future generation during the design process.","To help recognise that different people have different needs and expectations.","To seek consensus among stakeholders."], c:3,
   e:"Personas surface diverse needs and otherwise-voiceless stakeholders (future generations, vulnerable users). They are an empathy/representation tool ‚Äî <em>not</em> a mechanism for reaching consensus."},
  {sec:"Design for Values", q:"How can responsiveness in innovation processes help address the Collingridge dilemma?",
   o:["By focusing only on the most profitable technological pathways.","By ensuring technologies are developed according to technical codes and standards.","By eliminating uncertainty in the early phases of innovation.","By postponing irreversible embedding and allowing adaptation."], c:3,
   e:"The Collingridge dilemma: early on tech is easy to change but little is known; later much is known but tech is locked in. Responsiveness keeps options open ‚Äî postpone irreversible lock-in and adapt as you learn. You cannot simply ‚Äúeliminate‚Äù the uncertainty (c)."},
  /* ---- ¬ß2 Systems Thinking ---- */
  {sec:"Systems Thinking", q:"According to the text, what is a key limitation of focusing only on events?",
   o:["It causes people to ignore the importance of immediate action.","It discourages systems thinking to focus not only on short-term, but also on long-term planning.","It does not help system thinkers apply their conceptual and abstract theory to concrete happenings.","It leads to reactive solutions that often fail to address underlying causes."], c:3,
   e:"Event-level thinking treats symptoms, not structure. You react to each event instead of fixing the underlying patterns and structures that generate them."},
  {sec:"Systems Thinking", q:"Why do linear models often fail to capture real-world systems?",
   o:["They require too much data","They ignore interconnections and feedback loops","They cannot represent stocks","They are too complex to understand"], c:1,
   e:"Real systems are full of feedback loops and interconnections; linear (input‚Üíoutput) models miss exactly those circular causal links."},
  {sec:"Systems Thinking", q:"Which principle states that in linear systems, the output is proportional to the input?",
   o:["Feedback principle","Homogeneity principle","Non-linearity principle","Additivity principle"], c:1,
   e:"Homogeneity (scaling): f(a¬∑x)=a¬∑f(x) ‚Äî double the input, double the output. Additivity is f(x+y)=f(x)+f(y); together they define linearity."},
  {sec:"Systems Thinking", q:"The statement ‚Äúthe sum is greater than its parts‚Äù refers to:",
   o:["Reductionism in complex systems","Emergence in systems thinking","Linear causation systems","Continuity in business systems"], c:1,
   e:"<em>Emergence</em>: the whole has properties its parts don't. Reductionism is the opposite stance ‚Äî understanding the whole by breaking it into parts."},
  {sec:"Systems Thinking", q:"In the bathtub model, water in the tub represents:",
   o:["A flow","A boundary condition","A feedback loop","A stock"], c:3,
   e:"Water level = a <em>stock</em> (an accumulation). The faucet and drain are the <em>flows</em> that change it."},
  {sec:"Systems Thinking", q:"In system paradigms, analysis is linked to:",
   o:["Understanding entities through their relations within a whole","Non-linear causation","Reductionism and breaking systems into parts","Holism and synthesis"], c:2,
   e:"<em>Analysis</em> = breaking a system into parts (reductionism). Its counterpart, <em>synthesis</em>, is the holistic move of understanding parts through the whole."},
  {sec:"Systems Thinking", q:"<b>Figure 1 ‚Äî Causal Loop Diagram.</b> What are all the variables that form the ‚ÄúProfessor's morale‚Äù feedback loop in Figure 1?",
   fig:IMG_CLD,
   o:["Professor's motivation to work hard, Quality of educational resources, Student's enthusiasm with the course, Student's motivation to work hard, Quality of Team's Work, Quality of project's results","Professor's motivation to work hard, Quality of educational resources, Student's enthusiasm with the course, Student's motivation to work hard, Quality of project's results","Professor's fatigue, Professor's motivation to work hard, Work accomplished","Professor's motivation to work hard, Quality of educational resources, Student's enthusiasm with the course, Student's motivation to work hard, Quality of Team's Work, Quality of project's results, Resistance to change, Knowledge of Project Management Techniques"], c:0,
   e:"Trace only the closed ‚ÄúProfessor's morale‚Äù loop: Professor's motivation ‚Üí educational resources ‚Üí student's enthusiasm ‚Üí student's motivation ‚Üí Quality of Team's Work ‚Üí project's results ‚Üí back to Professor's motivation. Option d wrongly bolts on external variables (Resistance to change, Knowledge of PM Techniques) outside this loop; option b drops Quality of Team's Work."},

<p class="lead">A concept-recognition exam. You win by knowing <b>distinctions</b> cold (analysis vs synthesis, stock vs flow, reinforcing vs balancing, realist vs constructivist). Whenever two terms are paired, learn them as opposites.</p>

<h3>M1 ¬∑ Systems Engineering (NASA)</h3>
<p><b>NASA definition:</b> a methodical, multi-disciplinary approach to the <b>design, realization, technical management, operations, and retirement</b> of a system. (Full lifecycle ‚Äî "retirement" is the forgotten word.)</p>
<ul>
<li><b>System</b> = elements that function together to meet a need (hardware, software, people, processes‚Ä¶). The true value is <b>how parts interact</b>, not the parts themselves.</li>
<li><b>Building the system right</b> = meeting requirements. <b>Building the right system</b> = delivering intended outcomes & stakeholder value.</li>
<li>SE = both art & science; manages <b>trade-offs</b>; no subsystem optimised at the expense of the whole.</li>
</ul>

<h3>M2 ¬∑ What is a system?</h3>
<p>No single definition ‚Äî it depends on what you want to do with it. <b>Meadows:</b> a system is three things ‚Äî <b>elements, interconnections, function/purpose.</b></p>
<table class="zebra"><thead><tr><th>Part</th><th>Note</th></tr></thead><tbody>
<tr><td><b>Elements</b></td><td>Visible parts ‚Äî but can be <b>intangible</b> (school pride, standards). Easiest to see.</td></tr>
<tr><td><b>Interconnections</b></td><td><b>Physical flows OR information flows.</b> Info flows are harder to see.</td></tr>
<tr><td><b>Function / purpose</b></td><td>Hardest to see. <b>Deduced from behaviour, not stated goals.</b></td></tr>
</tbody></table>
<div class="trapbox"><div class="th">Trap</div><p>Purpose is read from <b>behaviour</b>, not rhetoric. A government "committed" to the environment that funds nothing ‚Üí protection is <b>not</b> its purpose.</p></div>
<p><b>Relative importance:</b> change elements ‚Üí least effect (swap all players, still a team); change interconnections ‚Üí can become unrecognisable (football rules ‚Üí basketball); change purpose ‚Üí drastic. The <b>least obvious part (purpose) is the most crucial.</b></p>
<p><b>Anderson &amp; Johnson ‚Äî 5 characteristics:</b> (1) all parts present; (2) parts arranged a specific way; (3) specific purpose within a larger system (can't merge/split ‚Äî "split an elephant, you don't get two elephants"); (4) stability through fluctuation/adjustment; (5) <b>rely on feedback.</b></p>
<div class="trapbox"><div class="th">Trap</div><p>"Which characteristic was <b>NOT</b> mentioned but could matter?" ‚Üí <b>Systems create their own boundaries.</b></p></div>

<h3>M2 ¬∑ Events ‚Üí Patterns ‚Üí Structure (the iceberg)</h3>
<ul>
<li><b>Events</b> = the tip; reacting to them only treats symptoms.</li>
<li><b>Patterns</b> = trends over time; lets you anticipate.</li>
<li><b>Structure</b> = the hidden arrangement of relationships/rules that <b>generates</b> the patterns. Fixing structure = lasting change.</li>
</ul>

<h3>M2 ¬∑ Linear vs non-linear</h3>
<p>Linear systems obey <b>additivity</b> (response to combined stimuli = sum of responses) and <b>homogeneity</b> (output ‚àù input ‚Äî "scale doesn't matter"). Real systems have <b>feedback, interaction, emergence</b> ‚Üí non-linear.</p>
<div class="keybox"><div class="th">Magic number 70</div><p>Doubling time ‚âà <b>70 √∑ growth%</b>. 2%/yr ‚Üí doubles in 35 yr; 10%/yr ‚Üí 7 yr. Exponential growth fools linear intuition (water-hyacinth lake).</p></div>
<p>Linear models persist because they are <b>intuitive, simple, and adequate for some systems.</b></p>

<h3>M3 ¬∑ Analysis vs Synthesis (paradigms)</h3>
<table class="zebra"><thead><tr><th>Analysis</th><th>Synthesis (systems thinking)</th></tr></thead><tbody>
<tr><td>Reductionism ‚Äî break into parts</td><td>Holism ‚Äî understand via the whole</td></tr>
<tr><td>Linear causation</td><td>Non-linear causation</td></tr>
<tr><td>Parts more important</td><td><b>Relationships</b> more important</td></tr>
<tr><td>Works for low interconnectivity</td><td>Works for high interconnectivity</td></tr>
</tbody></table>
<p>Systems "largely cause their own behaviour"; an external event only triggers it. Problems like poverty/addiction persist because they are <b>built into the system's structure.</b></p>

<h3>M3 ¬∑ Realist vs Constructivist (epistemology)</h3>
<p>Five classical assumptions, each opposed by a systems view:</p>
<table class="zebra"><thead><tr><th>Classical (realist)</th><th>Systems</th></tr></thead><tbody>
<tr><td>Equivalence (effect = cause)</td><td><b>Bifurcations</b> (tipping points)</td></tr>
<tr><td>Continuity (smooth)</td><td><b>Phases</b> (abrupt transitions)</td></tr>
<tr><td>Mechanistic (machine)</td><td><b>Self-interaction / adaptation</b></td></tr>
<tr><td>Elementaristic</td><td>Micro-processes <b>cooperate</b> ‚Üí new macro qualities</td></tr>
<tr><td>Realist</td><td><b>Constructivist</b> ‚Äî we build models, not reality</td></tr>
</tbody></table>
<div class="trapbox"><div class="th">Trap</div><p><b>Constructivism = model-based understanding of reality.</b> Ohm's law is a useful model, not reality itself.</p></div>

<h3>M4 ¬∑ Stocks &amp; Flows (SFD = quantitative)</h3>
<ul>
<li><b>Stock</b> = accumulation you can measure at an instant (water in a tub, population, goodwill). <b>If time stopped, stocks remain.</b></li>
<li><b>Flow</b> = rate in/out per time unit. <b>If time stopped, flows vanish.</b></li>
<li>Balance equation: inflow = outflow + accumulation. Indicators: <b>turnover time</b> (time to replace a stock), coverage time, harvest/regeneration, emission/absorption.</li>
</ul>

<h3>M4 ¬∑ Feedback loops</h3>
<table class="zebra"><thead><tr><th>Reinforcing (R)</th><th>Balancing (B)</th></tr></thead><tbody>
<tr><td>Amplifies change; A‚Üë‚ÜíB‚Üë‚ÜíA‚Üë</td><td>Opposes change; restores a setpoint</td></tr>
<tr><td>Source of <b>instability/growth</b> (or collapse)</td><td>Source of <b>stability</b> (homeostasis, steering, autopilot)</td></tr>
</tbody></table>
<div class="trapbox"><div class="th">Trap</div><p>Reinforcing ‚âÝ only growth ‚Äî it can also <b>spiral downward</b> (endangered species can't find mates ‚Üí extinction).</p></div>

<h3>M5 ¬∑ Causal Loop Diagrams (CLD = qualitative)</h3>
<ul>
<li>Variables + arrows; each arrow has <b>+ polarity</b> (same direction) or <b>‚àí polarity</b> (opposite). Loops labelled <b>R</b> or <b>B</b>.</li>
<li><b>+ link:</b> cause‚Üë ‚Üí effect‚Üë (and cause‚Üì ‚Üí effect‚Üì). <b>‚àí link:</b> cause‚Üë ‚Üí effect‚Üì.</li>
<li>CLD = <b>why</b> things happen (mental models, brainstorming). SFD = <b>how much/how fast</b> (simulation). Often: CLD first, then SFD.</li>
<li>Good CLD: clear variables, labelled polarities, loops named, arrows don't cross, narrative is internally coherent.</li>
</ul>
<div class="keybox"><div class="th">Polarity quick test</div><p>Count the negative links in a loop. <b>Even</b> number of ‚àí ‚Üí reinforcing. <b>Odd</b> ‚Üí balancing.</p></div>
`;
